<script>
const QUESTOES = [
  {num:1, exame:"XLVI Exame — 2026", titulo:"Causas Suspensivas e Separação Obrigatória de Bens", enunciado:"Joaquim, de 71 anos de idade, é viúvo de Marta há cerca de quatro anos, e não finalizou a partilha de bens deixados por sua falecida esposa, porque há um litígio entre o filho comum do ex-casal e a filha do primeiro casamento de Marta. Na semana passada, Joaquim procurou você, como advogado, para ser orientado juridicamente acerca da união que pretende estabelecer com Joana, tendo em vista que a partilha anterior não será realizada antes do novo matrimônio.", comando:"A respeito do regime de bens que deveria adotar na nova união, assinale a opção que apresenta, corretamente, a sua orientação.", gabarito:"D", alt:{"A": "Separação convencional de bens, ante a idade de Joaquim.", "B": "Qualquer regime de bens, por força da autonomia que é assegurada a Joaquim.", "C": "Comunhão parcial de bens, de forma a resguardar os bens ainda não partilhados.", "D": "Separação obrigatória de bens, para evitar a confusão patrimonial entre os vínculos conjugais."}, fb:{"A": "Incorreta. A separação convencional depende de pacto antenupcial escolhido voluntariamente. No caso, não há escolha: o regime é IMPOSTO por lei — separação OBRIGATÓRIA.", "B": "Incorreta. Não há autonomia aqui. Existem dois fundamentos de imposição legal do regime: (1) causa suspensiva do art. 1.523, I, CC (viúvo com herdeiros sem partilha) e (2) maior de 70 anos (art. 1.641, II, CC). O regime é obrigatório.", "C": "Incorreta. A comunhão parcial é o regime legal supletivo (quando os nubentes não escolhem). No caso de Joaquim, o regime é imposto por lei, não escolhido.", "D": "Correta! Dois fundamentos legais impõem a separação obrigatória: (1) Art. 1.523, I, CC: não devem casar o viúvo ou a viúva que tiver filho do cônjuge falecido, enquanto não fizer inventário e partilha — causa suspensiva que gera separação obrigatória (art. 1.641, I); (2) Art. 1.641, II, CC: separação obrigatória para maiores de 70 anos. Joaquim se enquadra em ambas as hipóteses."}, fund:"Art. 1.523, I, CC: causa suspensiva para viúvo(a) com herdeiros sem partilha. Art. 1.641, I e II, CC: regime de separação obrigatória quando há causa suspensiva ou quando o nubente tem mais de 70 anos. Atenção: após a Lei 12.344/2010, o limite etário subiu de 60 para 70 anos.", caqui:"Dois gatilhos em um só caso: (1) Viúvo com herdeiros e sem partilha = causa suspensiva = separação obrigatória. (2) 71 anos = mais de 70 anos = separação obrigatória. Qualquer um dos dois já seria suficiente. Joaquim caiu nos dois. Atenção: separação OBRIGATÓRIA ≠ separação CONVENCIONAL. A convencional é escolhida; a obrigatória é imposta."},
  {num:2, exame:"XLV Exame — 2025", titulo:"Sociedade entre Cônjuges — Art. 977 CC", enunciado:"Pedro e Vitória são casados desde 2005 no regime de comunhão parcial de bens e pretendem constituir sociedade simples com seus filhos Carlos e Conceição.", comando:"De acordo com as regras do Código Civil para a participação de pessoas casadas em sociedade, assinale a afirmativa correta.", gabarito:"C", alt:{"A": "É possível a constituição de sociedade simples simultaneamente entre os cônjuges e seus filhos, tendo em vista não ser a sociedade empresária.", "B": "É defeso a constituição de sociedade simples simultaneamente entre os cônjuges e seus filhos, qualquer que seja o regime de bens do casamento.", "C": "É possível a constituição de sociedade simples entre os cônjuges e seus filhos simultaneamente, tendo em vista ser o regime de bens do casamento de comunhão parcial.", "D": "É defeso a constituição de sociedade simples simultaneamente entre os cônjuges e seus filhos, pois o casamento foi celebrado em regime de bens diferente do da separação absoluta."}, fb:{"A": "Incorreta. O fundamento está errado: a possibilidade não decorre de ser sociedade simples (em vez de empresária), mas do REGIME DE BENS. O art. 977 CC se aplica a qualquer tipo de sociedade.", "B": "Incorreta. A vedação não é para qualquer regime — apenas para comunhão universal e separação obrigatória.", "C": "Correta! Art. 977, CC: os cônjuges podem contratar sociedade entre si ou com terceiros, salvo se casados em regime de comunhão universal ou de separação obrigatória. Pedro e Vitória são casados em COMUNHÃO PARCIAL — não há vedação. Logo, podem constituir sociedade entre si e com os filhos.", "D": "Incorreta. A vedação não alcança o regime de comunhão parcial. O art. 977 veda apenas comunhão universal e separação obrigatória."}, fund:"Art. 977, CC: podem os cônjuges contratar sociedade, entre si ou com terceiros, desde que não tenham casado no regime da comunhão universal de bens ou no da separação obrigatória.", caqui:"Art. 977 CC — a regra é que cônjuges PODEM ser sócios. Exceção: comunhão UNIVERSAL (risco de confusão patrimonial total) e separação OBRIGATÓRIA. Comunhão PARCIAL pode! O erro mais comum é pensar que casados não podem ser sócios nunca — errado. A vedação é específica para dois regimes."},
  {num:3, exame:"XLIV Exame — 2025", titulo:"Presunção de Paternidade — 300 Dias Após Morte", enunciado:"Beatriz nasceu duzentos e cinquenta dias após a morte do pai, Bernardo, com quem sua mãe, Gabriela, era casada há 2 anos. Quando Gabriela foi registrar Beatriz, Leonardo, irmão de Bernardo, afirmou que não aceitaria que ela a registrasse como filha de Bernardo, a não ser que Gabriela provasse a paternidade por meio de exame de DNA.", comando:"Sobre a situação apresentada, assinale a afirmativa correta.", gabarito:"D", alt:{"A": "Gabriela precisa realizar o exame de DNA para que possa registrar Beatriz, uma vez que é direito da família do falecido questionar a paternidade a este atribuída após a sua morte.", "B": "Gabriela precisa realizar o exame de DNA para que possa registrar Beatriz, uma vez que, nos termos do Código Civil, a paternidade não é presumida após a dissolução do vínculo conjugal.", "C": "Gabriela não precisa realizar o exame de DNA para que possa registrar Beatriz, uma vez que a criança nasceu após a morte de Bernardo e o direito para contestação da paternidade é personalíssimo.", "D": "Gabriela não precisa realizar o exame de DNA para que possa registrar Beatriz, uma vez que, nos termos do Código Civil, presumem-se concebidos na constância do casamento os filhos nascidos nos trezentos dias subsequentes à dissolução da sociedade conjugal por morte."}, fb:{"A": "Incorreta. Leonardo (irmão de Bernardo) não tem legitimidade para impedir o registro. A presunção legal dispensa DNA para o registro.", "B": "Incorreta. O CC presume justamente o contrário: a paternidade É presumida para filhos nascidos em até 300 dias após a morte do marido.", "C": "A conclusão está correta (não precisa de DNA), mas o fundamento está errado. O fundamento não é o caráter personalíssimo da ação de contestação, mas sim a PRESUNÇÃO LEGAL do art. 1.597, II, CC.", "D": "Correta! Art. 1.597, II, CC: presumem-se concebidos na constância do casamento os filhos nascidos nos trezentos dias subsequentes à dissolução da sociedade conjugal por morte. Beatriz nasceu 250 dias após a morte de Bernardo — dentro do prazo legal. A presunção opera automaticamente, dispensando exame de DNA para o registro."}, fund:"Art. 1.597, II, CC: presumem-se concebidos na constância do casamento os filhos nascidos nos trezentos dias subsequentes à dissolução da sociedade conjugal por morte, separação judicial, nulidade e anulação do casamento.", caqui:"300 dias = fronteira da presunção de paternidade. Beatriz nasceu 250 dias após a morte do pai — dentro dos 300 dias. A lei presume que foi concebida durante o casamento. Gabriela não precisa provar nada: a presunção é dela por força de lei. O irmão do falecido não tem poder de exigir DNA — só o pai (que morreu) ou seus herdeiros em ação específica poderiam contestar."},
  {num:4, exame:"XLIV Exame — 2025", titulo:"Tutela Testamentária — Prevalência Sobre a Tutela Legítima", enunciado:"Gabriel e Vitória, pais de Ana e Clara, faleceram em um acidente aéreo. Os parentes mais próximos de Ana e Clara são os tios Rafael (irmão de Gabriel), com 42 anos, e Júlia (irmã de Vitória), com 38 anos. Ana tem 9 anos e Clara tem 7 anos. Verificou-se que, em seus respectivos testamentos, Gabriel e Vitória nomearam como tutor das filhas Lucas, primo de Gabriel.", comando:"Segundo o ordenamento jurídico brasileiro, assinale a afirmativa correta.", gabarito:"D", alt:{"A": "Júlia deverá exercer a tutela das meninas, por estar no mesmo grau de parentesco que Rafael, e por ser mais nova que ele, além de ser parente mais próxima que Lucas.", "B": "Rafael deverá exercer a tutela das meninas, por estar no mesmo grau de parentesco que Júlia, e por ser mais velho que ela, além de ser parente mais próximo que Lucas.", "C": "Lucas não poderá exercer a tutela, porque somente os colaterais até o terceiro grau podem ser tutores.", "D": "Lucas deverá exercer a tutela, por ter sido nomeado pelos pais das meninas em testamento."}, fb:{"A": "Incorreta. A tutela testamentária (nomeada pelos pais em testamento) PREVALECE sobre a tutela legítima (parentes). Júlia não tem preferência sobre a escolha dos pais.", "B": "Incorreta. Pelo mesmo motivo: Rafael também não tem preferência sobre a tutela testamentária. A escolha dos pais em testamento é prioritária.", "C": "Incorreta. Não existe essa limitação legal (colaterais até 3º grau). Os pais podem nomear tutor qualquer pessoa capaz e idônea, incluindo primos (colateral de 4º grau).", "D": "Correta! Art. 1.729, CC: o direito de nomear tutor compete aos pais, em conjunto, por testamento ou qualquer outro documento autêntico. A tutela testamentária tem PRIORIDADE sobre a tutela legítima. Os pais nomearam Lucas — essa escolha prevalece sobre qualquer parente."}, fund:"Art. 1.729, CC: o direito de nomear tutor compete aos pais, em conjunto. Art. 1.731, CC: ordem da tutela legítima — aplicável apenas na ausência de tutor testamentário.", caqui:"Hierarquia da tutela: (1ª) Tutela testamentária — escolhida pelos pais. (2ª) Tutela legítima — parentes. (3ª) Tutela dativa — nomeada pelo juiz. Se os pais nomearam alguém, essa escolha SEMPRE prevalece — pouco importa se há tios mais próximos ou parentes de grau menor. A vontade dos pais no testamento é a lei número um."},
  {num:5, exame:"42º Exame — 2024", titulo:"Parentalidade Socioafetiva e Multiparentalidade", enunciado:"Priscila e Lucas tiveram filhos muito cedo. Com 20 anos, Priscila teve Hugo, com Pedro. Com 19 anos, Lucas teve Vitória, com Larissa. Priscila e Lucas se casaram tempos depois, morando com os filhos por vinte anos. Priscila cuidou de Vitória como se fosse mãe dela, contribuindo com as despesas. Lucas nunca desenvolveu relacionamento próximo com Hugo, apesar de viverem na mesma casa — os gastos de Hugo foram sempre custeados por Priscila e Pedro.", comando:"Sobre os fatos narrados, segundo o ordenamento jurídico brasileiro, assinale a afirmativa correta.", gabarito:"C", alt:{"A": "Por terem Priscila e Lucas criado as crianças, como um casal, sob o mesmo teto, fica automaticamente configurada a multiparentalidade.", "B": "Por ter sempre morado com Lucas, Hugo pode buscar o reconhecimento do vínculo de parentalidade socioafetiva com ele, o que extinguiria o vínculo jurídico entre Hugo e Pedro.", "C": "Por ter Priscila criado Vitória como se fossem mãe e filha, é possível o reconhecimento do vínculo de parentalidade socioafetiva, com o consentimento de Vitória e sem prejuízo, necessariamente, do vínculo de Vitória com Larissa.", "D": "Por ser conhecida a mãe biológica de Vitória, não é possível a configuração de parentalidade socioafetiva com Priscila, assim como, por ser conhecido o pai biológico de Hugo, não é possível a configuração de parentalidade socioafetiva com Lucas."}, fb:{"A": "Incorreta. A multiparentalidade NÃO surge automaticamente pela convivência sob o mesmo teto. Exige demonstração efetiva de exercício das funções parentais com afetividade.", "B": "Incorreta. Embora a convivência exista, o enunciado diz que Lucas NUNCA desenvolveu relacionamento próximo com Hugo. Sem vínculo afetivo efetivo, não há parentalidade socioafetiva. Além disso, o eventual reconhecimento NÃO extinguiria o vínculo com Pedro.", "C": "Correta! Priscila criou Vitória por 20 anos como mãe — afetividade, convivência e exercício das funções parentais demonstrados. Segundo o STF (RE 898.060), a parentalidade socioafetiva pode coexistir com a biológica (multiparentalidade). O reconhecimento da maternidade de Priscila não exclui necessariamente o vínculo de Vitória com Larissa.", "D": "Incorreta. A existência de vínculo biológico conhecido NÃO impede o reconhecimento da parentalidade socioafetiva. O STF consolidou a possibilidade de coexistência (multiparentalidade)."}, fund:"STF, RE 898.060 (Tese 622): a paternidade socioafetiva, declarada ou não em registro público, não impede o reconhecimento do vínculo de filiação concomitante baseado na origem biológica, com efeitos jurídicos próprios.", caqui:"Duas regras do STF para decorar: (1) Vínculo biológico + socioafetivo podem COEXISTIR (multiparentalidade). (2) A socioafetividade NÃO surge automaticamente — exige demonstração de afeto real e exercício de funções parentais. Priscila se encaixa: 20 anos criando Vitória = socioafetividade comprovável. Lucas não se encaixa com Hugo: estava presente mas sem vínculo afetivo real."},
  {num:6, exame:"XLI Exame — 2024", titulo:"Contestação da Paternidade e Continuação pelos Herdeiros", enunciado:"Um ano antes da morte de Otávio, Natália, 19 anos, ajuizou ação declaratória de filiação, alegando ter nascido antes de trezentos dias da dissolução da sociedade conjugal de Otávio com Antônia, mãe dela. Otávio ainda teve tempo de contestar, alegando que, à época em que Antônia engravidou, ele sofria de impotência, e que ela o traía com Bernardo, irmão gêmeo univitelino dele. Otávio faleceu pouco depois da contestação.", comando:"Sobre o caso, assinale a afirmativa correta.", gabarito:"A", alt:{"A": "Os herdeiros de Otávio podem, após a sua morte, prosseguir na ação.", "B": "Opera presunção absoluta de que Otávio é pai de Natália.", "C": "O adultério de Antônia é suficiente para afastar a presunção de paternidade de Otávio.", "D": "A alegação de impotência, ainda que provada, é irrelevante para a discussão da filiação."}, fb:{"A": "Correta! Art. 1.601, CC: cabe ao marido o direito de contestar a paternidade dos filhos nascidos de sua mulher. A ação é personalíssima — mas se o pai iniciou a contestação em vida, os herdeiros podem prosseguir na ação após sua morte (interpretação consolidada do CC e jurisprudência).", "B": "Incorreta. A presunção de paternidade (art. 1.597, CC) é RELATIVA (juris tantum), não absoluta — admite prova em contrário.", "C": "Incorreta. Art. 1.600, CC: o adultério da mulher, por si só, NÃO basta para ilidir a presunção da paternidade. É necessário elidir a presunção por outros meios de prova.", "D": "Incorreta. A impotência é elemento de prova relevante para contestar a paternidade. Se provada, pode contribuir para afastar a presunção."}, fund:"Art. 1.601, CC: cabe ao marido a contestação da paternidade — ação personalíssima. Jurisprudência: se o pai contestou em vida, os herdeiros podem continuar a ação após seu falecimento. Art. 1.600, CC: o adultério isolado não basta para afastar a presunção de paternidade.", caqui:"Dois filtros: (1) Pai CONTESTOU em vida → herdeiros PODEM continuar. (2) Pai MORREU sem contestar → em regra, não há como contestar (ação personalíssima extinta com a morte). Aqui Otávio contestou antes de morrer → herdeiros continuam. Sobre o adultério: sozinho não derruba a presunção. É um indício, não uma prova conclusiva."},
  {num:7, exame:"XL Exame — 2024", titulo:"Poder Familiar e Dever de Educação dos Filhos", enunciado:"Vitória e Rodrigo foram casados, em regime de comunhão parcial de bens, e são pais de Mariana. Quando Mariana atingiu 16 anos, os pais divorciaram-se, passando a residir em lares distintos e a compartilhar a guarda de Mariana. Mariana passou a residir com o pai.", comando:"A respeito do dever de educação de Mariana, assinale a afirmativa correta.", gabarito:"A", alt:{"A": "Caberá a Vitória e a Rodrigo, já que o dever de educação inserido nos deveres e direitos dos pais com relação aos filhos, no exercício do poder familiar, independe da situação conjugal de ambos.", "B": "Com o divórcio, o dever de educação passa a ser somente do pai, com quem Mariana reside, sendo impossível fisicamente Vitória colaborar nesse sentido, dada a distância física de Mariana.", "C": "Com o divórcio, caberá este dever somente ao pai, Rodrigo, pois, em que pese a guarda compartilhada, Mariana reside com ele.", "D": "A guarda e a convivência determinam a quem caberá o dever de educar o filho, de modo que, nesse caso, o dever de educação passa a ser somente do pai."}, fb:{"A": "Correta! Art. 1.632, CC: a separação judicial, o divórcio e a dissolução da união estável não alteram as relações entre pais e filhos senão quanto ao direito que lhes cabe de terem em sua companhia. O poder familiar — incluindo o dever de educação — permanece com AMBOS os genitores, independente do divórcio ou da guarda.", "B": "Incorreta. O divórcio não transfere exclusividade do dever de educação ao genitor com quem o filho reside.", "C": "Incorreta. Mesmo na guarda compartilhada com residência principal definida, o dever de educação não é exclusivo do genitor convivente.", "D": "Incorreta. Guarda e convivência definem onde a criança mora e como passa o tempo — não transferem exclusividade dos deveres parentais."}, fund:"Art. 1.632, CC: o divórcio não altera as relações entre pais e filhos. Art. 1.634, CC: o poder familiar inclui o dever de educação dos filhos — exercido por ambos os genitores independentemente da situação conjugal.", caqui:"Divórcio dissolve o CASAMENTO, não dissolve o PARENTESCO. O poder familiar continua intacto para ambos após o divórcio. Dever de educar = parte do poder familiar = de ambos. A guarda define onde a criança dorme, não quem é responsável por criá-la e educá-la."},
  {num:8, exame:"XL Exame — 2024", titulo:"Adultério e Partilha de Bens no Divórcio", enunciado:"Mariana e Lucas estão casados há mais de 10 anos em regime da comunhão parcial de bens. Recentemente, Mariana descobriu que Lucas vem mantendo uma relação extraconjugal com uma vizinha. A descoberta abalou profundamente o casamento, e Mariana pediu o divórcio. Mariana alega que Lucas perdeu o direito sobre todos os bens do casal por causa do adultério.", comando:"Sobre a hipótese apresentada, assinale a afirmativa correta.", gabarito:"B", alt:{"A": "O adultério traduz-se em violação do dever de recíproca fidelidade no casamento. Assim, em razão da traição de Lucas, Mariana tem direito à indenização correspondente a parte dos bens do casal.", "B": "A discussão de culpa e culpados para o divórcio não é mais necessária e, por isso, a divisão de bens deve seguir as regras do regime escolhido no casamento.", "C": "O adultério é uma das mais graves infrações dos deveres conjugais e tem, como consequência, a perda do direito à meação.", "D": "O adultério não interfere na partilha de bens do casal, mas tão somente no convívio do pai adúltero com os filhos menores de idade."}, fb:{"A": "Incorreta. O adultério, por si só, não gera direito automático a indenização correspondente a parte dos bens. Pode, em tese, gerar ação de responsabilidade civil, mas não reduz a meação.", "B": "Correta! Com a EC 66/2010, o divórcio passou a ser direito potestativo — eliminou-se a exigência de separação prévia e a discussão de culpa para dissolver o casamento. A partilha segue as REGRAS DO REGIME DE BENS (comunhão parcial = meação dos bens comuns), independentemente de quem foi o cônjuge infiel.", "C": "Incorreta. O adultério NÃO gera perda da meação. A partilha segue o regime de bens — ponto final.", "D": "Incorreta. O adultério também não interfere automaticamente no convívio com os filhos. As questões de guarda observam o melhor interesse da criança."}, fund:"EC 66/2010: eliminou a exigência de culpa para o divórcio. Art. 1.566, I, CC: fidelidade recíproca é dever conjugal. Art. 1.658 e ss., CC: partilha segue o regime de bens, sem influência do comportamento conjugal.", caqui:"Antes da EC 66/2010, existia a 'separação culposa' que podia reduzir direitos do cônjuge culpado. Essa discussão acabou. Hoje: quem trai não perde a meação. O regime de bens define o que é de quem — não o comportamento de cada um durante o casamento."},
  {num:9, exame:"XXXIX Exame — 2023", titulo:"Curatela do Ébrio Habitual", enunciado:"Devido às consequências da pandemia, Gabriel Cervantes teve graves problemas financeiros e profissionais, levando ao consumo de álcool de forma excessiva diariamente, sendo considerado pelos médicos como ébrio habitual. Rosa Torres, sua esposa, desesperada com a condição do marido e pela situação financeira da família, procura você, como advogado. O casal tem dois filhos absolutamente incapazes e os pais do marido encontram-se vivos. O casal não se encontra separado de fato.", comando:"Sobre a hipótese, segundo o sistema jurídico brasileiro, assinale a afirmativa correta.", gabarito:"D", alt:{"A": "O alcoolismo por si só não conduz à curatela, devendo a esposa demonstrar a prodigalidade do marido.", "B": "Em eventual curatela, os pais terão prioridade no exercício em relação à esposa, que só poderá ser designada curadora na desistência dos pais.", "C": "A autoridade do curador estende-se à pessoa e aos bens dos filhos do curatelado, enquanto não houver a maioridade ou a emancipação.", "D": "A interdição do ébrio habitual só o privará de, sem curador, emprestar, transigir, dar quitação, alienar ou hipotecar seu patrimônio, podendo praticar livremente os demais atos da vida civil."}, fb:{"A": "Incorreta. O ébrio habitual pode ser submetido à curatela independentemente de prodigalidade. A Lei 13.146/2015 (EPCD) manteve o ébrio habitual entre os que podem ser curatelados (art. 4º, II, CC).", "B": "Incorreta. Art. 1.775, CC: o cônjuge não separado judicialmente nem de fato TEM PREFERÊNCIA sobre os pais para exercer a curatela. Rosa tem prioridade sobre os pais de Gabriel.", "C": "Incorreta. A curatela não se estende automaticamente aos filhos do curatelado. Os filhos absolutamente incapazes ficam sujeitos ao poder familiar da mãe (Rosa) — não à curatela do pai.", "D": "Correta! Art. 1.782, CC: a interdição do ébrio habitual ou viciado em tóxico privará o interdito de praticar atos que possam onerar ou desfalcar o seu patrimônio — ou seja, é uma curatela RESTRITA a atos patrimoniais específicos (emprestar, transigir, dar quitação, alienar, hipotecar). Pode praticar livremente os demais atos da vida civil."}, fund:"Art. 4º, II, CC: os ébrios habituais são relativamente incapazes. Art. 1.775, CC: preferência do cônjuge para exercer a curatela. Art. 1.782, CC: curatela do ébrio habitual é restrita a atos de disposição patrimonial.", caqui:"Curatela do ébrio habitual tem um escopo RESTRITO: só tira a capacidade para atos patrimoniais que possam prejudicar o patrimônio (alienar, hipotecar, transigir, dar quitação). Ele pode fazer compras, votar, se locomover, contratar serviços comuns — para tudo isso é capaz. A curatela é uma restrição cirúrgica, não total. E o cônjuge (Rosa) tem PRIORIDADE sobre os pais para ser curador."},
  {num:10, exame:"XXXIX Exame — 2023", titulo:"Alimentos e Convivência São Direitos Independentes", enunciado:"Júlio Cesar e Thayane foram casados por 8 anos e tiveram 2 filhos. Como a separação foi amigável, o casal acordou verbalmente o valor da pensão alimentícia e o esquema de convivência parental. Entretanto, 3 anos após a separação, Thayane resolveu reajustar o valor da pensão, o que não foi aceito por Júlio Cesar. Como não conseguiram acordo, já que Júlio Cesar não pagou os valores solicitados, Thayane decidiu suspender o contato do pai com os filhos.", comando:"Assinale a opção que indica, corretamente, sua orientação como advogado.", gabarito:"C", alt:{"A": "A medida adotada por Thayane está correta, pois a mãe tem autonomia para suspender o contato do pai que não cumpre com seus deveres de prestar alimentos, resguardando, dessa forma, a proteção necessária ao desenvolvimento biopsíquico dos menores.", "B": "Thayane pode impedir o contato de Júlio Cesar com o filho, já que, após a separação, o exercício da autoridade familiar é exclusivo da mãe, que tem o dever de garantir os direitos das crianças e dos adolescentes.", "C": "Thayane não pode impedir a convivência de Júlio Cesar com os filhos em razão do não pagamento da pensão alimentícia nos valores que foram pleiteados, pois independentemente das questões pendentes com relação aos alimentos, a convivência dos filhos com os pais é um direito fundamental.", "D": "Thayane não pode impedir o contato de Júlio Cesar com os filhos, já que, tanto os alimentos, quanto a guarda e convivência parental jamais foram regularizadas judicialmente, limitando-se o casal a um acordo verbal."}, fb:{"A": "Incorreta. A mãe NÃO pode usar a convivência como moeda de troca pelo pagamento de alimentos. São direitos autônomos e independentes.", "B": "Incorreta. Após a separação, o poder familiar não é exclusivo da mãe — ambos os pais continuam exercendo o poder familiar.", "C": "Correta! Art. 1.589, CC e art. 227, CF: a convivência dos filhos com os pais é direito fundamental da criança. Não pode ser usada como sanção pelo inadimplemento de alimentos. O não pagamento tem outros remédios jurídicos (execução de alimentos, prisão civil). Mas suspender as visitas é vedado.", "D": "Incorreta. A fundamentação está errada — a impossibilidade de impedir a convivência não decorre da falta de formalização judicial, mas da natureza do direito de convivência como direito fundamental autônomo."}, fund:"Art. 1.589, CC: o pai ou a mãe, em cuja guarda não estejam os filhos, pode visitá-los. Art. 227, CF: é dever da família assegurar à criança o direito à convivência familiar. Alimentos e convivência são direitos autônomos — um não condiciona o outro.", caqui:"Alimentos e visitas = direitos INDEPENDENTES. Pai não paga pensão? Solução: execução de alimentos, prisão civil por dívida alimentar. Nunca: cortar visitas. Mãe corta visitas porque pai não paga? Ela pode responder por alienação parental (Lei 12.318/2010). Os direitos das crianças não são barganha."},
  {num:11, exame:"XXXVII Exame — 2023", titulo:"Comunhão Parcial — Herança, Doação, Carro e Loteria", enunciado:"Pedro e Joana casaram-se pelo regime da comunhão parcial de bens. Na constância do casamento, Pedro herdou ações e comprou um carro, enquanto Joana recebeu de doação um apartamento e ganhou um prêmio de loteria.", comando:"Com base nessas informações, assinale a opção que indica, em caso de divórcio, os bens que devem ser partilhados.", gabarito:"B", alt:{"A": "As ações e o apartamento.", "B": "O carro e o prêmio de loteria.", "C": "O carro e o apartamento.", "D": "As ações e o prêmio de loteria."}, fb:{"A": "Incorreta. Ações (herança de Pedro) e apartamento (doação a Joana) são bens que NÃO se comunicam — art. 1.659, I, CC.", "B": "Correta! CARRO: comprado onerosamente durante o casamento → comunica (art. 1.660, I, CC). LOTERIA: aquisição por fato eventual → comunica (art. 1.660, II, CC). AÇÕES HERDADAS: não comunicam (art. 1.659, I). APARTAMENTO DOADO: não comunica (art. 1.659, I).", "C": "Incorreta. Apartamento recebido por doação NÃO comunica.", "D": "Incorreta. Ações herdadas NÃO comunicam."}, fund:"Art. 1.659, I, CC: excluem-se da comunhão os bens adquiridos por herança ou doação. Art. 1.660, I, CC: entram na comunhão os bens adquiridos na constância do casamento por título oneroso. Art. 1.660, II, CC: entram na comunhão os bens adquiridos por fato eventual (loteria).", caqui:"Quadro mental para comunhão parcial: NÃO comunica = herança, doação, bens anteriores ao casamento, sub-rogados de bens particulares. COMUNICA = compra durante o casamento, loteria/sorteio (fato eventual), frutos dos bens particulares percebidos durante o casamento. A loteria É o distrator favorito da FGV — entra na partilha!"},
  {num:12, exame:"XXXVI Exame — 2022", titulo:"Guarda Compartilhada Obrigatória Mesmo Sem Acordo", enunciado:"Rodolfo e Marília estão casados desde 2005. Em 2010, nasceu Lorenzo, único filho do casal. No ano de 2020, eles resolveram se divorciar, após um período turbulento de discussões e mútuas relações extraconjugais. A única divergência entre o casal envolvia a guarda do filho, Lorenzo. Ambos os pais apresentam condições de exercício da guarda, relacionam-se bem com o filho e conseguem separar seus problemas conjugais de seus deveres paternos e maternos.", comando:"À luz do Código Civil, assinale a afirmativa correta.", gabarito:"B", alt:{"A": "Segundo a lei, o juiz, diante do conflito, deverá aplicar a guarda alternada entre Rodolfo e Marília.", "B": "Como os pais desejam a guarda do menor e estão aptos a exercer o poder familiar, a lei determina a aplicação da guarda compartilhada, mesmo que não haja acordo entre eles.", "C": "A lei determina a fixação da guarda compartilhada, mas, tendo em vista cuidar-se de divergência sobre a guarda, ela deve ser atribuída a Rodolfo ou a Marília, mas, diante do conflito, a guarda não deve ser atribuída a eles, em nenhuma hipótese.", "D": "Caso Rodolfo e Marília não consigam decidir de modo consensual a quem caberá a guarda de Lorenzo, o juiz será obrigado a atribuí-la ou a um genitor ou ao outro, uma vez que inexiste hipótese de guarda compartilhada na lei brasileira."}, fb:{"A": "Incorreta. A lei não prevê guarda alternada como regra. A guarda compartilhada é a regra legal.", "B": "Correta! Art. 1.584, §2º, CC (Lei 13.058/2014): quando não houver acordo entre a mãe e o pai quanto à guarda do filho, encontrando-se ambos os genitores aptos a exercer o poder familiar, será aplicada a guarda compartilhada, salvo se um dos genitores declarar ao magistrado que não deseja a guarda do menor. O conflito conjugal isolado NÃO impede a guarda compartilhada.", "C": "Incorreta. A lei não prevê essa solução para conflitos de guarda.", "D": "Incorreta. A guarda compartilhada está expressamente prevista no CC e é a REGRA LEGAL desde 2014."}, fund:"Art. 1.584, §2º, CC: guarda compartilhada é a regra quando ambos os pais são aptos, mesmo sem acordo. O conflito entre os pais, por si só, não afasta a guarda compartilhada.", caqui:"Desde 2014 (Lei 13.058), a guarda compartilhada virou REGRA — não exceção. Mesmo que os pais briguem muito, se ambos são aptos e nenhum declara não querer a guarda, o juiz DEVE aplicar a compartilhada. O conflito conjugal normal não é motivo para afastar a guarda compartilhada."},
  {num:13, exame:"XXXIII Exame — 2021", titulo:"Alimentos Socioafetivos e Revisão por Mudança Financeira", enunciado:"Antônio procedeu ao reconhecimento voluntário de paternidade socioafetiva de Lucas, com base no Provimento nº 63/2017 CNJ. Em meados de agosto de 2020, a convivência de Antônio e Lorena chegou ao fim. Antônio comprometeu-se a pagar alimentos para Lucas de R$ 2.500,00 mensais mediante acordo homologado judicialmente. No final de 2020, Antônio recebeu a notícia de que o escritório perdeu um cliente, gerando redução de 30% dos seus rendimentos mensais. Lorena, como representante legal de Lucas, recusou-se a estabelecer novo acordo.", comando:"Conforme este contexto, assinale a afirmativa correta.", gabarito:"C", alt:{"A": "A redução do encargo alimentar apenas poderá acontecer caso Lucas, por meio de sua representante legal, Lorena, concorde com ela.", "B": "Os filhos socioafetivos não têm o direito de pleitear alimentos frente aos seus pais.", "C": "Diante da mudança de sua situação financeira, Antônio poderá requerer ao juiz a redução do encargo alimentar.", "D": "Caso eventual pedido de redução do valor pago a título de obrigação alimentar seja procedente, Lucas nunca mais poderá pleitear a majoração do encargo, nem mesmo se a situação financeira de Antônio melhorar."}, fb:{"A": "Incorreta. A revisão dos alimentos não depende de concordância do alimentando — pode ser obtida judicialmente quando houver mudança nas circunstâncias.", "B": "Incorreta. A filiação socioafetiva gera os mesmos efeitos jurídicos da filiação biológica, incluindo o dever alimentar.", "C": "Correta! Art. 1.699, CC: se, fixados os alimentos, sobrevier mudança na situação financeira de quem os supre, o interessado pode pedir revisão ao juiz. A redução de 30% dos rendimentos configura alteração relevante do binômio necessidade-possibilidade, autorizando a ação revisional.", "D": "Incorreta. Os alimentos são sempre revisáveis — para cima e para baixo — conforme mudem as circunstâncias."}, fund:"Art. 1.699, CC: revisão dos alimentos quando houver mudança na situação financeira do alimentante ou do alimentando. Filiação socioafetiva gera os mesmos efeitos jurídicos da biológica — inclusive obrigação alimentar.", caqui:"Dois pontos em um: (1) Filiação socioafetiva reconhecida = filho para todos os efeitos, incluindo alimentos. (2) Alimentos nunca fazem coisa julgada absoluta — o binômio necessidade-possibilidade mudou, muda o valor. Lorena pode se recusar ao acordo amigável, mas não pode impedir que Antônio vá ao juiz pedir a revisão."},
  {num:14, exame:"XXXI Exame — 2020", titulo:"Comunhão Parcial — Frutos do Bem Particular Comunicam", enunciado:"Aldo e Mariane são casados sob o regime da comunhão parcial de bens, desde setembro de 2013. Em momento anterior ao casamento, Rubens, pai de Mariane, realizou a doação de um imóvel à filha. Desde então, a nova proprietária acumula os valores que lhe foram pagos pelos locatários do imóvel. A soma dos aluguéis totalizava R$ 150.000,00 — sendo R$ 50.000,00 auferidos antes do casamento e R$ 100.000,00 após. O imóvel atualmente está vazio.", comando:"Sobre essa situação e diante de eventual divórcio, assinale a afirmativa correta.", gabarito:"C", alt:{"A": "Quanto aos aluguéis, Aldo tem direito à meação sob o total dos valores.", "B": "Tendo em vista que o imóvel locado por Mariane é seu bem particular, os aluguéis por ela auferidos não se comunicam com Aldo.", "C": "Aldo tem direito à meação dos valores recebidos por Mariane, durante o casamento, a título de aluguel.", "D": "Aldo faz jus à meação tanto sobre a propriedade do imóvel doado a Mariane por Rubens, quanto sobre os valores recebidos a título de aluguel desse imóvel na constância do casamento."}, fb:{"A": "Incorreta. Aldo tem direito apenas aos R$ 100.000,00 recebidos DURANTE o casamento — não aos R$ 50.000,00 anteriores.", "B": "Incorreta. Esta é a pegadinha clássica: o imóvel (bem particular) não comunica, mas os FRUTOS do bem particular percebidos durante o casamento SIM comunicam.", "C": "Correta! Art. 1.660, V, CC: entram na comunhão os frutos dos bens particulares de cada cônjuge percebidos na constância do casamento. Os aluguéis são frutos civis do imóvel particular. Os R$ 100.000,00 recebidos durante o casamento comunicam-se com Aldo.", "D": "Incorreta. O imóvel doado antes do casamento é bem PARTICULAR de Mariane — não entra na comunhão. Apenas os frutos (aluguéis) durante o casamento comunicam."}, fund:"Art. 1.659, I, CC: excluem-se da comunhão os bens adquiridos por doação. Art. 1.660, V, CC: entram na comunhão os frutos dos bens particulares percebidos na constância do casamento.", caqui:"A armadilha mais repetida da FGV em regime de bens: 'se o bem não comunica, os frutos também não comunicam'. ERRADO. O bem particular fica de fora — mas os frutos que ele gera DURANTE o casamento entram na comunhão. Exemplo perfeito: imóvel doado (particular = fora) mas aluguel recebido durante o casamento (fruto = dentro)."},
  {num:15, exame:"XXXI Exame — 2020", titulo:"Obrigação Alimentar entre Irmãos", enunciado:"Salomão, solteiro, sem filhos, 65 anos, é filho de Lígia e Célio, que faleceram recentemente e eram divorciados. Ele é irmão de Bernardo, 35 anos, médico bem-sucedido, filho único do segundo casamento de Lígia. Salomão, por circunstâncias sociais, não mantinha contato com Bernardo. Em razão de uma deficiência física, Salomão nunca exerceu atividade laborativa e sempre morou com o pai, Célio, até o falecimento deste. Com frequência, seu primo Marcos, comerciante e grande amigo, o visita.", comando:"Com base no caso apresentado, assinale a opção que indica quem tem obrigação de pagar alimento a Salomão.", gabarito:"C", alt:{"A": "Marcos é obrigado a pagar alimentos a Salomão, no caso de necessidade deste.", "B": "Por ser irmão unilateral, Bernardo não deve, em hipótese alguma, alimentos a Salomão.", "C": "Bernardo, no caso de necessidade de Salomão, deve arcar com alimentos.", "D": "Bernardo e Marcos deverão dividir alimentos, entre ambos, de forma igualitária."}, fb:{"A": "Incorreta. Marcos é primo de Salomão — parente colateral de 4º grau. A lei não impõe obrigação alimentar a primos.", "B": "Incorreta. O CC não distingue irmão bilateral de irmão unilateral para fins de obrigação alimentar. Ambos têm a mesma obrigação subsidiária.", "C": "Correta! Art. 1.697, CC: na falta de ascendentes, a obrigação alimentar cabe aos descendentes e, faltando estes, aos irmãos. Salomão não tem pais, não tem filhos → recai nos irmãos. Bernardo é irmão de Salomão (irmão unilateral = mesma mãe) → tem obrigação de pagar alimentos se comprovada a necessidade.", "D": "Incorreta. Marcos (primo) não tem obrigação alimentar legal."}, fund:"Art. 1.697, CC: ordem da obrigação alimentar — ascendentes → descendentes → irmãos. A lei não diferencia irmãos bilaterais de unilaterais.", caqui:"Ordem dos alimentos: pais → filhos → irmãos. Primo = 4º grau colateral = fora da obrigação. Irmão unilateral (mesmo pai OU mesma mãe) TEM obrigação — o CC não faz distinção. Bernardo deve alimentos a Salomão se comprovada necessidade + possibilidade (binômio)."},
  {num:16, exame:"XXX Exame — 2019", titulo:"Outorga Conjugal e Bem Particular", enunciado:"Arnaldo, publicitário, é casado com Silvana, advogada, sob o regime de comunhão parcial de bens. Silvana sempre considerou diversificar sua atividade profissional e pensa em se tornar sócia de uma sociedade empresária. Para realizar esse investimento, pretende vender um apartamento adquirido antes de seu casamento com Arnaldo; este, mais conservador, não concorda com a venda.", comando:"Sobre a situação descrita, assinale a afirmativa correta.", gabarito:"C", alt:{"A": "Silvana não precisa de autorização de Arnaldo para alienar o apartamento, pois destina-se ao incremento da renda familiar.", "B": "A autorização de Arnaldo para alienação por Silvana é necessária, por conta do regime da comunhão parcial de bens.", "C": "Silvana não precisa de autorização de Arnaldo para alienar o apartamento, pois se trata de bem particular.", "D": "A autorização de Arnaldo para alienação por Silvana é necessária e decorre do casamento, independentemente do regime de bens."}, fb:{"A": "Incorreta. O fundamento está errado — a dispensa de autorização não decorre do destino econômico, mas da natureza particular do bem.", "B": "Incorreta. Na comunhão parcial, a outorga conjugal é exigida para alienação de bens COMUNS — não de bens particulares.", "C": "Correta! O apartamento foi adquirido ANTES do casamento → bem particular de Silvana (art. 1.659, I, CC). Bens particulares pertencem exclusivamente ao cônjuge proprietário. Silvana pode alienar sem precisar de autorização de Arnaldo.", "D": "Incorreta. A outorga conjugal para alienação de imóveis (art. 1.647, I, CC) aplica-se aos bens que integram a comunhão — não aos bens particulares de cada cônjuge."}, fund:"Art. 1.659, I, CC: excluem-se da comunhão os bens que cada cônjuge possuir ao casar. Art. 1.647, I, CC: outorga conjugal necessária para alienar imóveis — mas apenas os que integram o patrimônio comum.", caqui:"A outorga conjugal (autorização do cônjuge) é necessária para alienar imóveis que fazem parte da COMUNHÃO. Bem particular fica fora da comunhão → o cônjuge proprietário pode vender sem pedir permissão. Silvana tem o apartamento desde antes do casamento = bem 100% dela = pode vender à vontade."},
  {num:17, exame:"XXIX Exame — 2019", titulo:"Perda do Poder Familiar por Feminicídio", enunciado:"Asdrúbal praticou feminicídio contra sua esposa Ermingarda, com quem tinha três filhos, dois menores de 18 anos e um maior.", comando:"Nesse caso, quanto aos filhos, assinale a afirmativa correta.", gabarito:"B", alt:{"A": "Asdrúbal terá suspenso o poder familiar sobre os três filhos, por ato de autoridade policial.", "B": "Asdrúbal perderá o poder familiar sobre os filhos menores, por ato judicial.", "C": "Asdrúbal terá suspenso o poder familiar sobre os filhos menores, por ato judicial.", "D": "Asdrúbal perderá o poder familiar sobre os três filhos, por ato de autoridade policial."}, fb:{"A": "Incorreta. (1) Não é suspensão — é PERDA. (2) Não é ato policial — é ato JUDICIAL.", "B": "Correta! Art. 1.638, parágrafo único, I, CC (Lei 13.715/2018): perderá por ato judicial o poder familiar o pai ou a mãe que praticar homicídio, feminicídio ou lesão corporal grave contra o outro genitor. A perda se aplica apenas aos filhos MENORES — o filho maior já não está sujeito ao poder familiar (extingue-se com a maioridade, art. 1.635, III, CC).", "C": "Incorreta. A consequência é PERDA (permanente), não suspensão (temporária).", "D": "Incorreta. (1) O filho maior não está sujeito ao poder familiar. (2) A medida depende de ato JUDICIAL, não policial."}, fund:"Art. 1.638, parágrafo único, I, CC (Lei 13.715/2018): perda do poder familiar por ato judicial nos casos de feminicídio ou homicídio contra o outro genitor. Art. 1.635, III, CC: o poder familiar extingue-se pela maioridade.", caqui:"Dois detalhes decisivos: (1) SUSPENSÃO ≠ PERDA: suspensão é temporária, perda é definitiva. Feminicídio = PERDA (mais grave). (2) POLICIAL ≠ JUDICIAL: a perda do poder familiar só ocorre por DECISÃO JUDICIAL — a polícia não tem esse poder. (3) MENORES SOMENTE: filho maior já não tem poder familiar — não há o que perder."},
  {num:18, exame:"XXVIII Exame — 2019", titulo:"Ausência de Outorga Conjugal — Ato Anulável", enunciado:"Mônica, casada pelo regime da comunhão total de bens, descobre que seu marido, Geraldo, alienou um imóvel pertencente ao patrimônio comum do casal, sem a devida vênia conjugal. A descoberta agrava a crise conjugal entre ambos e acaba conduzindo ao divórcio do casal. Tempos depois, Mônica ajuíza ação em face de seu ex-marido, objetivando a invalidação da alienação do imóvel.", comando:"Sobre o caso narrado, assinale a afirmativa correta.", gabarito:"B", alt:{"A": "O juiz pode conhecer de ofício do vício decorrente do fato de Mônica não ter anuído com a alienação do bem.", "B": "O fato de Mônica não ter anuído com a alienação do bem representa um vício que convalesce com o decurso do tempo.", "C": "O vício decorrente da ausência de vênia conjugal não pode ser sanado pela posterior confirmação do ato por Mônica.", "D": "Para que a pretensão de Mônica seja acolhida, ela deveria ter observado o prazo prescricional de dois anos, a contar da data do divórcio."}, fb:{"A": "Incorreta. O juiz só pode conhecer de ofício vícios de NULIDADE ABSOLUTA. A falta de outorga conjugal gera ANULABILIDADE — depende de provocação do interessado.", "B": "Correta! Art. 1.649, CC: a falta de autorização torna anulável o ato praticado, podendo o outro cônjuge pleitear-lhe a anulação, até dois anos depois de terminada a sociedade conjugal. A anulabilidade convalesce com o decurso do prazo decadencial de 2 anos.", "C": "Incorreta. A anulabilidade PODE ser sanada por confirmação (ratificação) posterior do ato pela parte prejudicada (art. 172, CC).", "D": "Incorreta. O prazo do art. 1.649 é DECADENCIAL (não prescricional), de 2 anos contados da dissolução da sociedade conjugal."}, fund:"Art. 1.647, I, CC: outorga conjugal obrigatória para alienação de imóveis. Art. 1.649, CC: falta de autorização = ato anulável; prazo decadencial de 2 anos após a dissolução da sociedade conjugal para pleitear a anulação.", caqui:"Escala de gravidade dos vícios: NULIDADE ABSOLUTA (mais grave) = não convalesce, juiz conhece de ofício. ANULABILIDADE (menos grave) = convalesce, só o interessado pode pedir, tem prazo. Falta de vênia conjugal = anulabilidade. Prazo = 2 anos decadenciais a partir da dissolução da sociedade conjugal. Pode ser confirmada/ratificada."},
  {num:19, exame:"XXIV Exame — 2017", titulo:"Alimentos Avoengos — Obrigação Subsidiária dos Avós", enunciado:"João e Carla foram casados por cinco anos, mas se divorciaram. As três filhas do casal, menores impúberes, ficaram sob a guarda exclusiva da mãe, que trabalha em uma escola como professora, mas que está com os salários atrasados há quatro meses, sem previsão de recebimento. João vinha contribuindo para o sustento das crianças, mas deixou de fazê-lo. Carla, ao procurá-lo, foi informada pelos pais de João que ele sofreu um atropelamento e está em estado grave na UTI do Hospital Boa Sorte. Como João é autônomo, não pode contribuir, justificadamente, com o sustento das filhas.", comando:"Sobre a possibilidade de os avós participarem do sustento das crianças, assinale a afirmativa correta.", gabarito:"B", alt:{"A": "Em razão do divórcio, os sogros de Carla são ex-sogros, não são mais parentes, não podendo ser compelidos judicialmente a contribuir com o pagamento de alimentos para o sustento das netas.", "B": "As filhas podem requerer alimentos avoengos, se comprovada a impossibilidade de Carla e de João garantirem o sustento das filhas.", "C": "Os alimentos avoengos não podem ser requeridos, porque os avós só podem ser réus em ação de alimentos no caso de falecimento dos responsáveis pelo sustento das filhas.", "D": "Carla não pode representar as filhas em ação de alimentos avoengos, porque apenas os genitores são responsáveis pelo sustento dos filhos."}, fb:{"A": "Incorreta. O parentesco entre avós e netos NÃO se extingue com o divórcio dos pais. Os pais se divorciam entre si — mas os avós permanecem avós dos netos para sempre.", "B": "Correta! Art. 1.696, CC: o direito à prestação de alimentos é recíproco entre pais e filhos, e extensivo a todos os ascendentes — os mais próximos em grau precedem os mais remotos. Demonstrada a impossibilidade de Carla (salários atrasados) e João (UTI, sem renda), os avós podem ser acionados subsidiariamente.", "C": "Incorreta. Os avós respondem não apenas em caso de MORTE dos pais, mas também quando estes não podem prestar alimentos por qualquer motivo (incapacidade, insuficiência, impossibilidade).", "D": "Incorreta. Carla pode perfeitamente representar as filhas menores em ação de alimentos avoengos — ela é a representante legal delas."}, fund:"Art. 1.696, CC: obrigação alimentar recíproca entre pais e filhos, extensiva a todos os ascendentes. Art. 1.698, CC: na falta dos obrigados em primeiro grau, os de grau imediato podem ser acionados. Alimentos avoengos = subsidiários e complementares.", caqui:"Alimentos avoengos = dos avós para os netos. É obrigação SUBSIDIÁRIA — só surge quando os pais não conseguem prestar. Não precisa morrer — impossibilidade por qualquer motivo basta. O parentesco avós-netos não se extingue com o divórcio dos pais: João se divorciou de Carla, mas os pais de João continuam sendo avós das meninas."},
  {num:20, exame:"XXIII Exame — 2017", titulo:"Pacto Antenupcial Sem Casamento — Válido mas Ineficaz", enunciado:"Arlindo e Berta firmam pacto antenupcial, preenchendo todos os requisitos legais, no qual estabelecem o regime de separação absoluta de bens. No entanto, por motivo de saúde de um dos nubentes, a celebração civil do casamento não ocorreu na data estabelecida. Diante disso, Arlindo e Berta decidem não se casar e passam a conviver maritalmente. Após cinco anos de união estável, Arlindo pretende dissolver a relação familiar e aplicar o pacto antenupcial para não dividir os bens adquiridos na constância dessa união.", comando:"Nessas circunstâncias, o pacto antenupcial é", gabarito:"A", alt:{"A": "válido e ineficaz.", "B": "válido e eficaz.", "C": "inválido e ineficaz.", "D": "inválido e eficaz."}, fb:{"A": "Correta! Art. 1.653, CC: é nulo o pacto antenupcial se não for celebrado o casamento. Atenção: a doutrina interpreta que o pacto é VÁLIDO (não há vício na formação) mas INEFICAZ (não produz efeitos sem o casamento). O casamento nunca ocorreu → o pacto não pode ser aplicado à união estável → regime da UE = comunhão parcial (art. 1.725, CC).", "B": "Incorreta. O pacto não produz efeitos (ineficaz) sem o casamento.", "C": "Incorreta. Não há vício de invalidade — o pacto foi celebrado corretamente, com todos os requisitos. O problema é a ausência do casamento que o tornaria eficaz.", "D": "Incorreta. Logicamente impossível: se for inválido, não pode ser eficaz."}, fund:"Art. 1.653, CC: é nulo o pacto antenupcial se não lhe seguir o casamento. Art. 1.725, CC: regime da união estável = comunhão parcial, salvo contrato escrito específico para a união estável.", caqui:"VÁLIDO = foi feito corretamente, sem vícios. INEFICAZ = não produz efeitos porque faltou a condição (o casamento). Como distinguir: validade = olha para a formação do ato. Eficácia = olha para os efeitos do ato. O pacto foi feito certo → válido. Mas o casamento nunca veio → ineficaz. E não vale para a união estável — são institutos diferentes, cada um com suas regras."},
  {num:21, exame:"XXI Exame — 2016", titulo:"Guarda Compartilhada — Cidade-Base dos Filhos", enunciado:"Augusto e Raquel casam-se bem jovens, ambos com 22 anos. Um ano depois, nascem os filhos do casal: dois meninos gêmeos. O casamento não resiste à dura rotina de criação dos dois recém-nascidos. Augusto e Raquel se separam ainda com os filhos em tenra idade, indo as crianças residir com a mãe. Raquel, em pouco tempo, contrai novas núpcias. Augusto, em busca de um melhor emprego, muda-se para uma cidade próxima.", comando:"A respeito da guarda dos filhos, com base na hipótese apresentada, assinale a afirmativa correta.", gabarito:"D", alt:{"A": "A guarda dos filhos de tenra idade será atribuída preferencialmente, de forma unilateral, à mãe.", "B": "Na guarda compartilhada, o tempo de convívio com os filhos será dividido de forma matemática entre o pai e a mãe.", "C": "O pai ou a mãe que contrair novas núpcias perderá o direito de ter consigo os filhos.", "D": "Na guarda compartilhada, a cidade considerada base de moradia dos filhos será a que melhor atender aos interesses dos filhos."}, fb:{"A": "Incorreta. A lei brasileira não estabelece preferência automática da mãe para a guarda — especialmente após a Lei 13.058/2014, que reforçou a igualdade entre os genitores.", "B": "Incorreta. Guarda compartilhada não significa divisão matemática (50/50) do tempo. Significa compartilhamento das responsabilidades e decisões. O tempo de convivência deve ser equilibrado — mas não necessariamente igual.", "C": "Incorreta. Art. 1.588, CC: o cônjuge que contrair novas núpcias não perde o direito de ter os filhos consigo.", "D": "Correta! Art. 1.583, §3º, CC: na guarda compartilhada, a cidade considerada base de moradia dos filhos será aquela que melhor atender aos interesses dos filhos."}, fund:"Art. 1.583, §3º, CC: na guarda compartilhada, a cidade-base de moradia dos filhos será a que melhor atender aos interesses dos filhos. Art. 1.588, CC: novas núpcias não retiram o direito à guarda.", caqui:"Guarda compartilhada ≠ divisão de tempo matemática (50/50). É divisão de RESPONSABILIDADE e DECISÃO. A cidade-base dos filhos = a que melhor atende ao interesse deles (não necessariamente onde mora o pai, nem onde mora a mãe). Novas núpcias dos pais = irrelevante para a guarda."},
  {num:22, exame:"XXI Exame — 2016", titulo:"Doação ao Concubino Após Separação de Fato", enunciado:"João e Maria casaram-se, no regime de comunhão parcial de bens, em 2004. Em 2008, João conheceu Vânia e passaram a ter um relacionamento amoroso. Separando-se de fato de Maria, João saiu da casa e foi viver com Vânia, apesar de continuar casado com Maria. Em 2016, João resolve dar de presente um carro 0 km para Vânia.", comando:"Sobre o contrato de doação celebrado entre João e Vânia, assinale a afirmativa correta.", gabarito:"D", alt:{"A": "É nulo, pois é hipótese de doação de cônjuge adúltero ao seu cúmplice.", "B": "Poderá ser anulado, desde que Maria pleiteie a anulação até dois anos depois da assinatura do contrato.", "C": "É plenamente válido, porém João deverá pagar perdas e danos à Maria.", "D": "É plenamente válido, pois João e Maria já estavam separados de fato no momento da doação."}, fb:{"A": "Incorreta. O art. 550, CC permite a anulação da doação do cônjuge adúltero ao cúmplice — mas esta proteção pressupõe que AINDA EXISTA vida conjugal efetiva. Com a separação de fato, a relação conjugal já estava encerrada.", "B": "Incorreta. O art. 550, CC não se aplica aqui porque João e Maria estavam separados de fato há 8 anos. A separação de fato encerra a vida conjugal — a jurisprudência do STJ consolidou esse entendimento.", "C": "Incorreta. Não há fundamento para perdas e danos nesse contexto.", "D": "Correta! A separação de fato desde 2008 encerrou efetivamente a sociedade conjugal. Quando João doou o carro a Vânia em 2016, já não havia vida conjugal com Maria. O STJ reconhece que a separação de fato afasta a incidência da vedação do art. 550, CC."}, fund:"Art. 550, CC: a doação do cônjuge adúltero ao cúmplice pode ser anulada. Contudo, a separação de fato anterior encerra a vida conjugal e afasta a aplicação do art. 550. Jurisprudência STJ consolidada: separação de fato é marco da dissolução da vida conjugal para fins patrimoniais.", caqui:"O art. 550 CC protege o cônjuge traído durante o casamento ativo. Mas João estava separado de fato há 8 ANOS. A separação de fato é um divisor de águas: encerrou a vida conjugal mesmo sem divórcio formal. Após a separação de fato, João e Vânia podem ter união estável (e provavelmente tinham). A doação é válida."},
  {num:23, exame:"XX Exame — 2016", titulo:"Cancelamento de Pensão do Filho Maior — Súmula 358 STJ", enunciado:"Roberto e Marcela, divorciados, são pais de João. Quando João completou dezoito anos, Roberto, que se encontrava desempregado, de imediato parou de pagar a pensão alimentícia, sem prévia autorização judicial.", comando:"Com base na situação descrita, assinale a afirmativa correta.", gabarito:"D", alt:{"A": "Por estar desempregado, Roberto não é mais obrigado a pagar a pensão alimentícia ao filho maior de idade; logo, o pagamento da pensão pode ser interrompido sem autorização judicial.", "B": "O implemento da maioridade de João, por si só, faz com que não seja mais necessário o pagamento da pensão alimentícia, independentemente da situação econômica do provedor.", "C": "O ordenamento jurídico tutela o alimentante de boa-fé; logo, a interrupção do pagamento se dará com o mero fato da maioridade.", "D": "O cancelamento de pensão alimentícia de filho que atingiu a maioridade está sujeito à decisão judicial, mediante contraditório."}, fb:{"A": "Incorreta. O desemprego pode justificar REVISÃO (exoneração ou redução), mas nunca autoriza a interrupção unilateral sem decisão judicial.", "B": "Incorreta. A maioridade NÃO extingue automaticamente a obrigação alimentar — extingue o poder familiar. O filho maior que ainda estuda ou não tem condições de se sustentar pode continuar recebendo pensão.", "C": "Incorreta. A boa-fé do alimentante não substitui a decisão judicial necessária para o cancelamento.", "D": "Correta! Súmula 358, STJ: 'O cancelamento de pensão alimentícia de filho que atingiu a maioridade está sujeito à decisão judicial, mediante contraditório, ainda que nos próprios autos.' Roberto deveria ter pedido a exoneração ao juiz — não pode simplesmente parar de pagar."}, fund:"Súmula 358, STJ: cancelamento da pensão do filho maior depende de decisão judicial com contraditório. A maioridade extingue o poder familiar (art. 1.635, III, CC), mas não extingue automaticamente a obrigação alimentar.", caqui:"Maioridade ≠ fim automático da pensão. A maioridade encerra o PODER FAMILIAR — não a obrigação de alimentar. O filho maior que ainda precisa (ex: cursando faculdade) pode continuar recebendo. Para parar de pagar, o pai precisa de DECISÃO JUDICIAL que o exonere — não pode simplesmente parar. Súmula 358 STJ: palavra final da banca."},
  {num:24, exame:"XX Exame — 2016", titulo:"Alteração do Regime de Bens Durante o Casamento", enunciado:"Juliana é sócia de uma sociedade empresária que produz bens que exigem alto investimento, por meio de financiamento significativo. Casada com Mário pelo regime da comunhão universal de bens, desde 1998, e sem filhos, decide o casal alterar o regime de casamento para o de separação de bens, sem prejudicar direitos de terceiros, e com a intenção de evitar a colocação do patrimônio já adquirido em risco.", comando:"Sobre a situação narrada, assinale a afirmativa correta.", gabarito:"C", alt:{"A": "A alteração do regime de bens mediante escritura pública, realizada pelos cônjuges e averbada no Registro Civil, é possível.", "B": "A alteração do regime de bens, tendo em vista que o casamento foi realizado antes da vigência do Código Civil de 2002, não é possível.", "C": "A alteração do regime de bens mediante autorização judicial, com pedido motivado de ambos os cônjuges, apurada a procedência das razões invocadas e ressalvados os direitos de terceiros, é possível.", "D": "Não é possível a alteração para o regime da separação de bens, tão somente para o regime de bens legal, qual seja, o da comunhão parcial de bens."}, fb:{"A": "Incorreta. A simples escritura pública NÃO basta. A alteração exige AUTORIZAÇÃO JUDICIAL (art. 1.639, §2º, CC).", "B": "Incorreta. O STJ admite a alteração do regime mesmo para casamentos anteriores ao CC/2002, desde que observados os requisitos legais.", "C": "Correta! Art. 1.639, §2º, CC: é admissível a alteração do regime de bens, mediante autorização judicial em pedido motivado de ambos os cônjuges, apurada a procedência das razões invocadas e ressalvados os direitos de terceiros.", "D": "Incorreta. A lei permite a mudança para qualquer regime legalmente admitido — inclusive separação de bens."}, fund:"Art. 1.639, §2º, CC: alteração do regime de bens possível mediante: (1) pedido conjunto dos cônjuges, (2) motivação, (3) autorização judicial, (4) ressalva dos direitos de terceiros.", caqui:"Fórmula da alteração de regime: PMAT — Pedido conjunto + Motivação + Autorização Judicial + Terceiros protegidos. Apenas escritura pública NÃO basta — precisa de decisão judicial. Pode mudar para qualquer regime, incluindo separação. Casamento de 1998? Não importa — STJ admite a alteração para casamentos anteriores ao CC/2002."},
  {num:25, exame:"XX Exame — 2016", titulo:"Comunhão Parcial — Loteria e Frutos de Bens Particulares", enunciado:"Em maio de 2005, Sérgio e Lúcia casaram-se pelo regime da comunhão parcial de bens. Antes de se casar, ele já era proprietário de dois imóveis. Em 2006, Sérgio alugou seus dois imóveis — os aluguéis foram depositados em conta corrente aberta por ele. Em 2010, Sérgio recebeu o prêmio máximo da loteria, em dinheiro, imediatamente aplicado em conta poupança. Em 2013, Lúcia e Sérgio se separaram. Lúcia procurou um advogado para saber se tinha direito ao prêmio da loteria e aos aluguéis.", comando:"Com base na hipótese narrada, assinale a afirmativa correta.", gabarito:"D", alt:{"A": "Ela não tem direito à partilha do prêmio e aos valores depositados na conta corrente de Sérgio, oriundos dos aluguéis de seus imóveis, uma vez que se constituem como bens particulares de Sérgio.", "B": "Ela tem direito à partilha dos valores depositados na conta corrente de Sérgio, oriundos dos aluguéis de seus imóveis, mas não tem direito à partilha do prêmio obtido na loteria.", "C": "Ela tem direito à partilha do prêmio, mas não poderá pleitear a partilha dos valores depositados na conta corrente de Sérgio, oriundos dos aluguéis de seus imóveis.", "D": "Ela tem direito à partilha do prêmio e dos valores depositados na conta corrente de Sérgio, oriundos dos aluguéis dos imóveis de Sérgio, uma vez que ambos constituem-se bens comuns do casal."}, fb:{"A": "Incorreta. Tanto o prêmio quanto os aluguéis comunicam-se.", "B": "Incorreta. O prêmio de loteria também comunica (fato eventual — art. 1.660, II, CC).", "C": "Incorreta. Os aluguéis percebidos durante o casamento também comunicam (frutos do bem particular — art. 1.660, V, CC).", "D": "Correta! PRÊMIO DA LOTERIA: art. 1.660, II, CC — bens adquiridos por fato eventual comunicam-se. ALUGUÉIS: art. 1.660, V, CC — frutos dos bens particulares percebidos na constância do casamento comunicam-se. Os imóveis em si (adquiridos antes do casamento) NÃO comunicam — mas seus frutos sim."}, fund:"Art. 1.660, II, CC: entram na comunhão os bens adquiridos por fato eventual (loteria). Art. 1.660, V, CC: entram na comunhão os frutos dos bens particulares percebidos na constância do casamento (aluguéis). Os imóveis em si permanecem particulares (art. 1.659, I, CC).", caqui:"Tripla pegadinha em uma questão: (1) Imóveis anteriores = particulares (fora da comunhão). (2) Aluguéis desses imóveis DURANTE o casamento = frutos = dentro da comunhão. (3) Loteria = fato eventual = dentro da comunhão. A conta ser só de Sérgio não importa — é a ORIGEM do dinheiro que define se entra na comunhão."},
  {num:26, exame:"XIX Exame — 2016", titulo:"Reconhecimento de Filho — Ato Irrevogável", enunciado:"Júlio, casado com Isabela durante 23 anos, com quem teve 3 filhos, durante audiência realizada em ação de divórcio cumulada com partilha de bens proposta por Isabela, reconhece, perante o Juízo de Família, um filho havido de relacionamento extraconjugal. Posteriormente, arrependido, Júlio deseja revogar tal reconhecimento.", comando:"Sobre os fatos narrados, assinale a afirmativa correta.", gabarito:"B", alt:{"A": "O reconhecimento de filho só é válido se for realizado por escritura pública ou testamento.", "B": "O reconhecimento de filho realizado por Júlio perante o Juízo de Família é ato irrevogável.", "C": "O reconhecimento de filho em Juízo só tem validade em ação própria com essa finalidade.", "D": "Júlio só poderia revogar o ato se este tivesse sido realizado por testamento."}, fb:{"A": "Incorreta. Art. 1.609, CC lista as formas válidas de reconhecimento — não apenas escritura pública e testamento. A manifestação perante o juiz (inciso IV) também é válida.", "B": "Correta! Art. 1.609, IV, CC: o reconhecimento pode se dar por manifestação direta e expressa perante o juiz. Art. 1.610, CC: o reconhecimento não pode ser revogado. Júlio reconheceu o filho perante o juízo de família — ato válido e IRREVOGÁVEL.", "C": "Incorreta. O reconhecimento pode ocorrer incidentalmente em qualquer processo, não apenas em ação específica.", "D": "Incorreta. Mesmo o reconhecimento por testamento é irrevogável — aliás, a revogação do testamento não revoga o reconhecimento de filiação nele contido."}, fund:"Art. 1.609, IV, CC: reconhecimento por manifestação perante o juiz. Art. 1.610, CC: o reconhecimento não pode ser revogado.", caqui:"Formas de reconhecer um filho (art. 1.609 CC): registro de nascimento, escritura pública, escrito particular, testamento, manifestação perante o juiz. Todas são válidas. E todas são IRREVOGÁVEIS (art. 1.610). Júlio pode se arrepender — mas o vínculo jurídico com o filho está estabelecido. O reconhecimento protege o filho, não o pai."},
  {num:27, exame:"XVIII Exame — 2015", titulo:"Curatela — Preferência do Cônjuge", enunciado:"Fabiana e Mauro são casados pelo regime da separação convencional de bens e possuem dois filhos: Amanda e Pedro, de 19 e 16 anos, respectivamente. Mauro é filho de José, que se encontra com 65 anos. Mauro sofreu um acidente automobilístico e, em razão da violência do acidente, está em estado de coma, impossibilitado de exercer os atos da vida civil, razão pela qual sua interdição tornou-se necessária.", comando:"Diante dos fatos narrados, assinale a afirmativa correta.", gabarito:"D", alt:{"A": "Fabiana, em razão do regime de bens que rege o casamento, não poderá ser nomeada curadora de Mauro.", "B": "Como Mauro possui ascendente vivo e capaz, este será nomeado seu curador, na forma da lei.", "C": "A filha de Mauro, por ser maior e capaz, será nomeada sua curadora, na forma da lei.", "D": "Fabiana será nomeada curadora de Mauro, na forma da lei."}, fb:{"A": "Incorreta. O regime de bens do casamento é IRRELEVANTE para definir o curador. Separação convencional de bens não impede que o cônjuge seja curador.", "B": "Incorreta. José (pai de Mauro) só seria curador se não houvesse cônjuge apto. A ordem do art. 1.775, CC coloca o cônjuge em 1º lugar.", "C": "Incorreta. Amanda (filha, 19 anos) só seria curadora se não houvesse cônjuge nem pais aptos.", "D": "Correta! Art. 1.775, CC: o curador é o cônjuge ou companheiro, não separado judicialmente ou de fato. Fabiana está casada com Mauro, não estão separados — ela tem PRIORIDADE LEGAL sobre o pai e sobre os filhos."}, fund:"Art. 1.775, CC: ordem de preferência para a curatela — (1º) cônjuge/companheiro não separado; (2º) pais; (3º) descendentes. O regime de bens não interfere na preferência para exercer a curatela.", caqui:"Curatela — ordem de preferência: cônjuge (1º) > pais (2º) > filhos (3º). O regime de bens é completamente irrelevante para isso. Fabiana é a esposa de Mauro, casada, não separada = ela é a primeira da fila. O pai (José) e os filhos só entram se ela não puder ou não quiser."},
  {num:28, exame:"XVIII Exame — 2015", titulo:"Comunhão Parcial — Loteria Comunica, Herança Não Comunica", enunciado:"Roberto e Ana casaram-se, em 2005, pelo regime da comunhão parcial de bens. Em 2008, Roberto ganhou na loteria e, com os recursos auferidos, adquiriu um imóvel no Recreio dos Bandeirantes. Em 2014, Roberto foi agraciado com uma casa em Santa Teresa, fruto da herança de sua tia. Em 2015, Roberto e Ana se separaram.", comando:"Tendo em vista o regime de bens do casamento, assinale a afirmativa correta.", gabarito:"B", alt:{"A": "Os imóveis situados no Recreio dos Bandeirantes e em Santa Teresa são bens comuns e, por isso, deverão ser partilhados em virtude da separação do casal.", "B": "Apenas o imóvel situado no Recreio dos Bandeirantes deve ser partilhado, sendo o imóvel situado em Santa Teresa bem particular de Roberto.", "C": "Apenas o imóvel situado em Santa Teresa deve ser partilhado, sendo o imóvel situado no Recreio dos Bandeirantes excluído da comunhão, por ter sido adquirido com o produto de bem advindo de fato eventual.", "D": "Nenhum dos dois imóveis deverá ser partilhado, tendo em vista que ambos são bens particulares de Roberto."}, fb:{"A": "Incorreta. O imóvel de Santa Teresa (herança) é bem particular — não entra na partilha.", "B": "Correta! Recreio dos Bandeirantes (comprado com prêmio de loteria): art. 1.660, II, CC — bens adquiridos por fato eventual comunicam-se → PARTILHA. Santa Teresa (herança da tia): art. 1.659, I, CC — bens recebidos por herança não comunicam → BEM PARTICULAR.", "C": "Incorreta. A questão inverteu: loteria comunica, herança não comunica.", "D": "Incorreta. O imóvel comprado com o prêmio de loteria comunica-se."}, fund:"Art. 1.659, I, CC: excluem-se da comunhão os bens adquiridos por herança ou doação. Art. 1.660, II, CC: entram na comunhão os bens adquiridos por fato eventual (incluindo o que for adquirido COM o prêmio de loteria).", caqui:"A pegadinha eterna da FGV: LOTERIA comunica, HERANÇA não comunica. Muita gente inverte. E aqui tem um detalhe extra: Roberto COMPROU um imóvel COM o dinheiro da loteria. O sub-rogado de fato eventual também comunica — o imóvel do Recreio entra na partilha. A casa de Santa Teresa (herança direta) fica fora."},
  {num:29, exame:"XVII Exame — 2015", titulo:"Alimentos entre Irmãos — Colateral de 2º Grau", enunciado:"Maria, solteira, após a morte de seus pais em acidente automobilístico, propõe demanda por alimentos em face de Pedro, seu parente colateral de segundo grau.", comando:"Diante dos fatos narrados e considerando as normas de Direito Civil, assinale a opção correta.", gabarito:"B", alt:{"A": "Como Pedro é parente colateral de Maria, não tem obrigação de prestar alimentos a esta, ainda que haja necessidade por parte dela.", "B": "Pedro só será obrigado a prestar alimentos caso Maria não possua ascendentes nem descendentes, ou, se os possuir, estes não tiverem condições de prestá-los ou complementá-los.", "C": "A obrigação de prestar alimentos é solidária entre ascendentes, descendentes e colaterais, em havendo necessidade do alimentando e possibilidade do alimentante.", "D": "Pedro não tem obrigação de prestar alimentos, pois não é irmão de Maria."}, fb:{"A": "Incorreta. Irmãos (colaterais de 2º grau) TÊM obrigação alimentar — subsidiária — quando faltarem ascendentes e descendentes.", "B": "Correta! Art. 1.697, CC: na falta dos ascendentes, cabe a obrigação aos descendentes e, faltando estes, aos irmãos. Pedro é parente colateral de 2º grau = IRMÃO de Maria. Com a morte dos pais e sem filhos, recai nos irmãos — mas de forma subsidiária: Pedro só responde se não houver ascendentes ou descendentes com condições de prestar.", "C": "Incorreta. A obrigação alimentar entre parentes NÃO é solidária — é SUBSIDIÁRIA. Existe uma ordem de preferência: ascendentes → descendentes → irmãos.", "D": "Incorreta. Colateral de 2º grau = IRMÃO. Pedro é irmão de Maria."}, fund:"Art. 1.697, CC: faltando ascendentes, a obrigação passa aos descendentes; faltando estes, passa aos irmãos. Obrigação é subsidiária — não solidária.", caqui:"Parentes colaterais e seus graus: 2º grau = irmãos; 3º grau = tios e sobrinhos; 4º grau = primos. Irmão TEM obrigação alimentar subsidiária. Primo NÃO tem. A questão só diz 'colateral de 2º grau' — você precisa saber que isso é irmão. E a obrigação é subsidiária (não solidária): primeiro esgota os ascendentes e descendentes, depois vem os irmãos."},
  {num:30, exame:"XV Exame — 2014", titulo:"União Estável — Causa Suspensiva e Alimentos", enunciado:"Augusto, viúvo, pai de Gustavo e Fernanda, conheceu Rita e com ela manteve, por dez anos, um relacionamento amoroso contínuo, público, duradouro e com objetivo de constituir família. Nesse período, Augusto não se preocupou em fazer o inventário dos bens adquiridos quando casado e em realizar a partilha entre os herdeiros Gustavo e Fernanda. Em meados de setembro do corrente ano, Augusto resolveu romper o relacionamento com Rita.", comando:"Face aos fatos narrados e considerando as regras de Direito Civil, assinale a opção correta.", gabarito:"C", alt:{"A": "A ausência de partilha dos bens de Augusto com seus herdeiros Gustavo e Fernanda caracteriza causa suspensiva do casamento, o que obsta o reconhecimento da união estável entre Rita e Augusto.", "B": "Sendo reconhecida a união estável entre Augusto e Rita, aplicar-se-ão à relação patrimonial as regras do regime de comunhão universal de bens, salvo se houver contrato dispondo de forma diversa.", "C": "Em razão do fim do relacionamento amoroso, Rita poderá pleitear alimentos em desfavor de Augusto, devendo, para tanto, comprovar o binômio necessidade-possibilidade.", "D": "As dívidas contraídas por Augusto, na constância do relacionamento com Rita, em proveito da entidade familiar, serão suportadas por Rita de forma subsidiária."}, fb:{"A": "Incorreta. Art. 1.723, §2º, CC: as causas suspensivas do casamento NÃO impedem a caracterização da união estável. A falta de partilha é causa suspensiva do casamento — mas NÃO impede a UE.", "B": "Incorreta. Art. 1.725, CC: o regime legal da união estável é a COMUNHÃO PARCIAL de bens (não universal), salvo contrato escrito.", "C": "Correta! Após o fim da união estável, Rita pode pleitear alimentos de Augusto se demonstrar o binômio necessidade-possibilidade (art. 1.694, CC). O direito alimentar existe entre companheiros.", "D": "Incorreta. As dívidas em proveito da entidade familiar geram responsabilidade SOLIDÁRIA entre os companheiros — não subsidiária."}, fund:"Art. 1.723, §2º, CC: causas suspensivas não impedem a UE. Art. 1.725, CC: regime legal da UE = comunhão parcial. Art. 1.694, CC: alimentos entre companheiros após dissolução da UE.", caqui:"Quatro armadilhas em uma questão: (1) Causa suspensiva impede UE? NÃO — impede apenas o casamento. (2) Regime da UE = comunhão PARCIAL (não universal). (3) Alimentos após UE = possível com binômio necessidade-possibilidade. (4) Dívidas familiares = responsabilidade SOLIDÁRIA (não subsidiária)."},
  {num:31, exame:"XIV Exame — 2014", titulo:"Prestação de Contas na Tutela — Obrigação Inafastável", enunciado:"Marcos e Paula, casados, pais de Isabel e Marcelo, menores impúberes, faleceram em um grave acidente automobilístico. Em decorrência deste fato, Pedro, avô materno nomeado tutor dos menores, restou incumbido, nos termos do testamento, do dever de administrar o patrimônio dos netos, avaliado em dois milhões de reais. De acordo com o testamento, o tutor foi dispensado de prestar contas de sua administração.", comando:"Diante dos fatos narrados e considerando as regras de Direito Civil sobre prestação de contas no exercício da tutela, assinale a opção correta.", gabarito:"D", alt:{"A": "Pedro está dispensado de prestar contas do exercício da tutela, tendo em vista o disposto no testamento deixado pelos pais de Isabel e Marcelo, por ser um direito disponível.", "B": "Caso Pedro falecesse no exercício da tutela, haveria dispensa de seus herdeiros prestarem contas da administração dos bens de Isabel e Marcelo.", "C": "A responsabilidade de Pedro de prestar contas da administração da tutela cessará quando Isabel e Marcelo atingirem a maioridade e derem a devida quitação.", "D": "Pedro tem a obrigação de prestar contas da administração da tutela de dois em dois anos e também quando deixar o exercício da tutela, ou sempre que for determinado judicialmente."}, fb:{"A": "Incorreta. Art. 1.755, CC: os tutores são OBRIGADOS a prestar contas de sua administração, AINDA QUE o contrário tenham disposto os pais dos tutelados. A cláusula testamentária de dispensa é INEFICAZ — a prestação de contas é obrigação de ordem pública.", "B": "Incorreta. A morte do tutor não extingue a obrigação de prestar contas — os herdeiros do tutor respondem por ela.", "C": "Incorreta — detalhe técnico: a quitação pelos tutelados que atingiram a maioridade é um dos modos de encerramento, mas a alternativa não reproduz corretamente o comando legal sobre QUANDO e COMO prestar contas.", "D": "Correta! Art. 1.756, CC: o tutor prestará contas de dois em dois anos e também quando deixar o exercício da tutela ou whenever o juiz determinar."}, fund:"Art. 1.755, CC: obrigação de prestar contas — inafastável mesmo por disposição testamentária. Art. 1.756, CC: periodicidade — a cada 2 anos, ao encerrar a tutela, quando o juiz determinar.", caqui:"Prestação de contas na tutela é INAFASTÁVEL — ordem pública, não pode ser dispensada nem por testamento dos pais. Os pais quiseram dispensar Pedro? Cláusula ineficaz. Pedro presta contas de 2 em 2 anos, quando sair da tutela, e sempre que o juiz mandar. Isso protege os bens dos menores — não é direito do tutor, é dever imposto por lei."},
  {num:32, exame:"XII Exame — 2013", titulo:"Poder Familiar — Bens do Trabalho do Filho Maior de 16 Anos", enunciado:"Tiago, com 17 anos de idade e relativamente incapaz, sob autoridade de seus pais Mário e Fabiana, recebeu, por doação de seu tio, um imóvel com duas lojas comerciais e dois apartamentos. Tiago trabalha como cantor nos finais de semana, tendo uma renda mensal de R$ 3.000,00.", comando:"Face aos fatos narrados e considerando as regras de Direito Civil, assinale a opção correta.", gabarito:"C", alt:{"A": "Mário e Fabiana exercem sobre os bens imóveis de Tiago o direito de usufruto convencional, inerente à relação de parentesco que perdurará até a maioridade civil ou emancipação de Tiago.", "B": "Mário e Fabiana poderão alienar ou onerar o bem imóvel de Tiago, desde que haja prévia autorização do Ministério Público e seja demonstrado o evidente interesse da prole.", "C": "Mário e Fabiana não poderão administrar os valores auferidos por Tiago no exercício de atividade de cantor, bem como os bens com tais recursos adquiridos.", "D": "Mario e Fabiana, entrando em colisão de interesses com Tiago sobre a administração dos bens, facultam ao juiz, de ofício, nomear curador especial."}, fb:{"A": "Incorreta. O usufruto dos pais sobre os bens dos filhos é LEGAL (art. 1.689, CC) — não convencional.", "B": "Incorreta. Para alienar imóvel do filho menor, é precisa de autorização JUDICIAL (não do MP), com demonstração de necessidade ou evidente interesse do menor.", "C": "Correta! Art. 1.693, II, CC: excluem-se do usufruto e da administração dos pais os bens adquiridos pelo filho maior de 16 anos com o produto de seu trabalho. Os R$ 3.000,00 mensais de Tiago como cantor e os bens comprados com esse dinheiro estão FORA da administração dos pais.", "D": "Incorreta — detalhe processual: a nomeação de curador especial em caso de colisão de interesses entre pais e filho não é feita pelo juiz de ofício de forma automática."}, fund:"Art. 1.693, II, CC: excluem-se do usufruto e da administração dos pais os bens adquiridos pelo filho maior de 16 anos no exercício de atividade profissional e os bens com tais recursos adquiridos.", caqui:"O art. 1.693, II CC é a exceção clássica ao poder de administração dos pais: filho maior de 16 anos que trabalha = dinheiro do trabalho dele + o que comprar com esse dinheiro = FORA do controle dos pais. Tiago tem 17 anos e ganha como cantor → os R$ 3.000,00 são dele, os pais não administram."},
  {num:33, exame:"XII Exame — 2013", titulo:"Ausência — Morte Presumida e Dissolução do Casamento", enunciado:"José, brasileiro, casado no regime da separação absoluta de bens, professor universitário e plenamente capaz para os atos da vida civil, desapareceu de seu domicílio, estando em local incerto e não sabido, não havendo indícios ou notícias das razões de seu desaparecimento, não existindo outorga de poderes a nenhum mandatário, nem feitura de testamento. Vera (esposa) e Cássia (filha de José e Vera, maior e capaz) pretendem a declaração de sua morte presumida.", comando:"De acordo com as regras concernentes ao instituto jurídico da morte presumida com declaração de ausência, assinale a opção correta.", gabarito:"D", alt:{"A": "Na fase de curadoria dos bens do ausente, diante da ausência de representante ou mandatário, o juiz nomeará como sua curadora legítima Cássia, pois apenas na falta de descendentes, tal curadoria caberá ao cônjuge supérstite, casado no regime da separação absoluta de bens.", "B": "Na fase de sucessão provisória, mesmo que comprovada a qualidade de herdeiras de Vera e Cássia, estas, para se imitirem na posse dos bens do ausente, terão que dar garantias da restituição deles, mediante penhores ou hipotecas equivalentes aos quinhões respectivos.", "C": "Na fase de sucessão definitiva, regressando José dentro dos dez anos seguintes à abertura da sucessão definitiva, terá ele direito aos bens ainda existentes, no estado em que se encontrarem, mas não aos bens que foram comprados com a venda dos bens que lhe pertenciam.", "D": "Quanto ao casamento de José e Vera, o Código Civil atual reconhece efeitos pessoais e não apenas patrimoniais ao instituto da ausência, possibilitando que a sociedade conjugal seja dissolvida como decorrência da morte presumida do ausente."}, fb:{"A": "Incorreta. Art. 25, CC: na curadoria dos bens do ausente, a preferência é do cônjuge não separado — Vera tem prioridade sobre Cássia (filha). O regime de separação absolut
