a não altera essa ordem.", "B": "Incorreta. Art. 30, CC: os ascendentes, descendentes e o cônjuge do ausente estão DISPENSADOS da prestação de garantia para se imitir na posse dos bens.", "C": "Incorreta. Art. 39, CC: o ausente que retorna dentro de 10 anos após a abertura da sucessão definitiva tem direito aos bens existentes NO ESTADO EM QUE SE ENCONTRAM, incluindo os bens sub-rogados (comprados com a venda dos seus).", "D": "Correta! Art. 1.571, §1º, CC: o casamento se dissolve pela morte real ou pela morte presumida do cônjuge declarado ausente. A ausência produz efeitos PESSOAIS (dissolução do casamento) além dos patrimoniais."}, fund:"Art. 1.571, §1º, CC: a morte presumida declarada pelo juiz dissolve o casamento. Art. 25, CC: na curadoria, preferência do cônjuge. Art. 30, CC: cônjuge, ascendentes e descendentes dispensados de garantia na sucessão provisória. Art. 39, CC: retorno do ausente dentro de 10 anos = direito aos bens existentes e sub-rogados.", caqui:"A pegadinha principal: a ausência produz efeito PESSOAL de dissolver o casamento — não apenas efeitos patrimoniais. Art. 1.571, §1º CC. Outras armadilhas: (1) Curadoria: cônjuge tem preferência sobre filhos. (2) Sucessão provisória: cônjuge e descendentes estão DISPENSADOS de dar garantia. (3) Sub-rogado: o ausente que volta tem direito ao bem que foi COMPRADO COM A VENDA dos seus (sub-rogado)."},
  {num:34, exame:"XI Exame — 2013", titulo:"Revisão de Alimentos — Binômio Necessidade-Possibilidade", enunciado:"Fernanda, mãe da menor Joana, celebrou um acordo na presença do Juiz de Direito para que Arnaldo, pai de Joana, pague mensalmente 20% de 1 salário mínimo a título de alimentos para a menor. O juiz homologou por sentença tal acordo. Após um mês, Fernanda tomou conhecimento de que Arnaldo trocou seu emprego por outro com salário maior.", comando:"Analisando o caso concreto, assinale a afirmativa correta.", gabarito:"C", alt:{"A": "Não é possível rever o valor dos alimentos fixados, pois o mesmo já foi decidido em sentença com trânsito em julgado formal.", "B": "Não é possível rever o valor dos alimentos fixados, pois o mesmo é fruto de acordo celebrado entre as partes e homologado por juiz de direito.", "C": "É possível rever o valor dos alimentos, pois no caso concreto houve mudança do binômio 'necessidade x possibilidade'.", "D": "É possível rever o valor dos alimentos, pois o acordo celebrado entre as partes e homologado pelo juiz de direito está abaixo do limite mínimo de 30% de 1 salário mínimo, fixado em lei, como mínimo indispensável que uma pessoa deve receber de alimentos."}, fb:{"A": "Incorreta. Os alimentos NÃO fazem coisa julgada material imutável — são sempre revisáveis quando mudam as circunstâncias.", "B": "Incorreta. Mesmo fixados por acordo homologado, os alimentos podem ser revisados judicialmente quando houver alteração do binômio.", "C": "Correta! Art. 1.699, CC: se, fixados os alimentos, sobrevier mudança na situação financeira de quem os supre ou de quem os recebe, o interessado pode pedir revisão ao juiz. A melhora financeira de Arnaldo (salário maior) altera o binômio necessidade-possibilidade.", "D": "Incorreta. Não existe 'mínimo de 30% de 1 salário mínimo' fixado em lei. Esse número foi inventado pela banca para confundir."}, fund:"Art. 1.699, CC: mudança na situação financeira do alimentante ou do alimentando = direito de pedir revisão judicial dos alimentos.", caqui:"Alimentos são PERMANENTEMENTE REVISÁVEIS. Não existe coisa julgada imutável em alimentos — o binômio (necessidade × possibilidade) é dinâmico. Melhorou o salário de Arnaldo? Pede a majoração. Piorou? Pede a redução. É para isso que existe a ação revisional de alimentos. E atenção: a alternativa D inventa um 'mínimo legal de 30%' que não existe — pegadinha clássica."},
  {num:35, exame:"X Exame — 2013", titulo:"Fiança Sem Outorga Conjugal — Ato Anulável", enunciado:"Amélia e Alberto são casados pelo regime de comunhão parcial de bens. Alfredo, amigo de Alberto, pede que ele seja seu fiador na compra de um imóvel.", comando:"Diante da situação apresentada, assinale a afirmativa correta.", gabarito:"C", alt:{"A": "A garantia acessória poderá ser prestada exclusivamente por Alberto.", "B": "A outorga de Amélia se fará indispensável, independente do regime de bens.", "C": "A fiança, se prestada por Alberto sem o consentimento de Amélia, será anulável.", "D": "A anulação do aval somente poderá ser pleiteada por Amélia durante o período em que estiver casada."}, fb:{"A": "Incorreta. Alberto NÃO pode prestar fiança sem a autorização de Amélia — salvo se fossem casados em separação absoluta.", "B": "Incorreta. A outorga conjugal NÃO é exigida no regime de SEPARAÇÃO ABSOLUTA de bens.", "C": "Correta! Art. 1.647, III, CC: nenhum dos cônjuges pode prestar fiança sem autorização do outro, salvo no regime de separação absoluta. Alberto é casado em comunhão parcial → precisa da outorga de Amélia. Sem a outorga → fiança ANULÁVEL (art. 1.649, CC).", "D": "Incorreta. (1) A questão fala em FIANÇA, não aval. (2) O prazo para pedir a anulação é de 2 anos após a dissolução da sociedade conjugal (art. 1.649, CC) — não apenas durante o casamento."}, fund:"Art. 1.647, III, CC: outorga conjugal necessária para prestar fiança (exceto separação absoluta). Art. 1.649, CC: ato praticado sem outorga = anulável; prazo = 2 anos após dissolução da sociedade conjugal.", caqui:"Regra da outorga conjugal: praticamente todo ato que comprometa significativamente o patrimônio exige autorização do cônjuge. Fiança especificamente está no art. 1.647, III CC. Sem autorização = anulável (não nulo). A exceção é a separação absoluta de bens — nesse regime, cada um decide por si. Aqui: comunhão parcial = precisa da outorga de Amélia."},
  {num:36, exame:"VI Exame — 2012 (Reaplicação)", titulo:"Poder Familiar — Novo Cônjuge Não Interfere", enunciado:"A respeito do poder familiar, assinale a alternativa correta.", comando:"A respeito do poder familiar, assinale a alternativa correta.", gabarito:"D", alt:{"A": "O filho que possua dezesseis anos de idade, ainda que tenha contraído casamento válido, permanece sujeito ao poder familiar de seus pais até que complete dezoito anos de idade.", "B": "Na constância do casamento entre os pais, havendo falta ou impedimento de um deles, caberá ao outro obter autorização judicial, a fim de exercer com exclusividade o poder familiar sobre os filhos comuns do casal.", "C": "Exorbita os limites do exercício do poder familiar exigir que os filhos prestem quaisquer serviços aos pais, ainda que sejam considerados próprios para a idade e condição daqueles.", "D": "Não é autorizado ao novo cônjuge interferir no poder familiar exercido por sua esposa sobre os filhos por ela havidos na constância do primeiro casamento, mesmo em caso de falecimento do pai das crianças."}, fb:{"A": "Incorreta. Art. 5º, parágrafo único, II, CC: o casamento válido EMANCIPA o menor. Casou com 16 anos = emancipado = extinto o poder familiar (art. 1.635, III, CC).", "B": "Incorreta. Art. 1.631, CC: faltando ou estando impedido um dos genitores, o outro EXERCE SOZINHO o poder familiar — sem precisar de autorização judicial.", "C": "Incorreta. Art. 1.634, VII, CC: os pais podem exigir dos filhos que prestem serviços 'próprios de sua idade e condição' — não exorbita o poder familiar.", "D": "Correta! Art. 1.636, CC: o pai ou a mãe que contrair novas núpcias não perde, quanto aos filhos do relacionamento anterior, os direitos inerentes ao poder familiar. E o novo cônjuge (padrasto) NÃO adquire o poder familiar — nem mesmo em caso de falecimento do pai biológico."}, fund:"Art. 1.636, CC: novas núpcias não transferem nem eliminam o poder familiar. Art. 5º, §único, II, CC: casamento emancipa. Art. 1.631, CC: falta de um genitor = outro exerce sozinho, sem autorização judicial.", caqui:"Padrasto/madrasta NÃO tem poder familiar automaticamente — nem com morte do pai biológico. O poder familiar da mãe é exercido por ela, não pelo novo marido. Outra: o casamento EMANCIPA (mesmo com 16 anos) = extingue o poder familiar. E falta de um dos pais = o outro exerce sozinho, sem pedir autorização ao juiz."},
  {num:37, exame:"VIII Exame — 2012", titulo:"Tutela — Alienação de Imóvel do Menor Exige Autorização Judicial", enunciado:"Eduardo e Mônica, casados, tinham um filho menor chamado Renato. Por orientação de um advogado, Eduardo e Mônica, em 2005, fizeram os respectivos testamentos e nomearam Lúcio, irmão mais velho de Eduardo, como tutor do menor. Pouco antes da nomeação por testamento, Lúcio fora definitivamente condenado pelo crime de dano (art. 163 do Código Penal), mas o casal manteve a nomeação. Em 2010, Eduardo e Mônica morreram em um acidente aéreo. Dois anos depois, Lúcio decide alienar a terceiros um dos bens imóveis do patrimônio de Renato, prevendo manifesta vantagem negocial.", comando:"Diante do caso narrado, assinale a afirmativa correta.", gabarito:"C", alt:{"A": "A nomeação de Lúcio como tutor é inválida em razão de ter sido condenado criminalmente, independentemente do cumprimento da pena, mas a alienação do imóvel é lícita, pois atende ao princípio do melhor interesse do menor.", "B": "A nomeação de Lúcio como tutor é válida, apesar da condenação criminal, e a alienação do imóvel é lícita, pois atende ao princípio do melhor interesse do menor.", "C": "A nomeação de Lúcio como tutor é válida, apesar da condenação criminal, mas a alienação do imóvel, sem prévia avaliação e autorização judicial, é ilícita.", "D": "A nomeação de Lúcio é inválida em razão de ter sido condenado criminalmente, mas a alienação do imóvel é lícita, pois somente bens móveis de alto valor necessitam de prévia avaliação e autorização judicial."}, fb:{"A": "Incorreta. A nomeação pelos pais que tinham conhecimento da condenação é VÁLIDA. E a alienação sem autorização judicial é ILÍCITA (não lícita).", "B": "Incorreta. A nomeação é válida — mas a alienação SEM autorização judicial é ilícita.", "C": "Correta! (1) NOMEAÇÃO: os pais sabiam da condenação e mantiveram a nomeação → válida (a condenação por crime de dano por si só não impede a tutela quando os pais, cientes disso, optaram pela nomeação). (2) ALIENAÇÃO: Art. 1.748, IV + art. 1.750, CC: o tutor NÃO pode alienar imóveis do menor sem prévia avaliação e autorização judicial → ilícita.", "D": "Incorreta. A autorização judicial é necessária para IMÓVEIS (não apenas para bens móveis de alto valor)."}, fund:"Art. 1.748, IV, CC: o tutor não pode alienar bens imóveis do menor sem autorização judicial. Art. 1.750, CC: a venda de imóveis do menor depende de prévia avaliação e autorização judicial.", caqui:"Regra de ouro da tutela: IMÓVEL DO MENOR = sempre precisa de avaliação prévia + autorização judicial para alienar. Não importa se o negócio é vantajoso, se o tutor é de boa-fé, se vai depositar o dinheiro — sem o juiz autorizar, é ilícito. O juiz é o guardião do patrimônio do menor."},
  {num:38, exame:"IX Exame — 2012", titulo:"Alimentos Transitórios e Exceção do Bem de Família", enunciado:"Henrique e Natália, casados sob o regime de comunhão parcial de bens, decidiram se divorciar após 10 anos de união conjugal. Do relacionamento nasceram Gabriela e Bruno, hoje com 8 e 6 anos, respectivamente. Enquanto esteve casada, Natália, apesar de ter curso superior completo, ser pessoa jovem e capaz para o trabalho, não exerceu atividade profissional para se dedicar integralmente aos cuidados da casa e dos filhos.", comando:"Considerando a hipótese acima e as regras atinentes à prestação de alimentos, assinale a afirmativa correta.", gabarito:"C", alt:{"A": "Uma vez homologado judicialmente o valor da prestação alimentícia devida por Henrique em favor de seus filhos Gabriela e Bruno, no percentual de um salário mínimo para cada um, ocorrendo a constituição de nova família por parte de Henrique, automaticamente será minorado o valor dos alimentos devido aos filhos do primeiro casamento.", "B": "Henrique poderá opor a impenhorabilidade de sua única casa, por ser bem de família, na hipótese de ser acionado judicialmente para pagar débito alimentar atual aos seus filhos Gabriela e Bruno.", "C": "Natália poderá pleitear alimentos transitórios e por prazo razoável, se demonstrar sua dificuldade em ingressar no mercado de trabalho em razão do longo período que permaneceu afastada do desempenho de suas atividades profissionais para se dedicar integralmente aos cuidados do lar.", "D": "Caso Natália descubra, após dois meses de separação de fato, que espera um filho de Henrique, serão devidos alimentos gravídicos até o nascimento da criança, pois após este fato a obrigação alimentar somente será exigida em ação judicial própria."}, fb:{"A": "Incorreta. Nova família de Henrique NÃO reduz automaticamente os alimentos dos filhos do primeiro casamento. A redução depende de ação revisional judicial demonstrando alteração do binômio.", "B": "Incorreta. Art. 3º, III, Lei 8.009/90: a impenhorabilidade do bem de família NÃO prevalece contra dívida de alimentos. Henrique não pode usar o bem de família como escudo contra pensão alimentícia.", "C": "Correta! Jurisprudência do STJ: ex-cônjuge apto ao trabalho mas que ficou afastado por longo período dedicado à família pode receber alimentos TRANSITÓRIOS — por prazo razoável para reinserção no mercado de trabalho. Natália ficou 10 anos fora — pode pleitear alimentos temporários.", "D": "Incorreta. Art. 6º, Lei 11.804/2008: os alimentos gravídicos convertem-se AUTOMATICAMENTE em pensão alimentícia em favor do recém-nascido após o nascimento — sem necessidade de nova ação judicial."}, fund:"Lei 11.804/2008, art. 6º: alimentos gravídicos convertem-se automaticamente em pensão após o nascimento. Lei 8.009/90, art. 3º, III: bem de família pode ser penhorado para pagar alimentos. Jurisprudência STJ: alimentos transitórios para ex-cônjuge apto mas afastado do mercado.", caqui:"Três armadilhas em uma questão: (1) Nova família não reduz automaticamente pensão dos filhos anteriores. (2) Bem de família NÃO é escudo contra dívida alimentar (exceção expressa da Lei 8.009). (3) Alimentos gravídicos: após o nascimento, viram pensão AUTOMATICAMENTE — sem nova ação. Natália: 10 anos fora do mercado = tem direito a alimentos TRANSITÓRIOS para se recolocar."},
  {num:39, exame:"VII Exame — 2012", titulo:"Perfilhação — Características do Reconhecimento de Filho", enunciado:"A respeito da perfilhação é correto dizer que:", comando:"A respeito da perfilhação é correto dizer que:", gabarito:"A", alt:{"A": "Constitui ato formal, de livre vontade, irretratável, incondicional e personalíssimo.", "B": "Se torna perfeita exclusivamente por escritura pública ou instrumento particular.", "C": "Não admite o reconhecimento de filhos já falecidos, quando estes hajam deixado descendentes.", "D": "Em se tratando de filhos maiores, dispensa-se o consentimento destes."}, fb:{"A": "Correta! O reconhecimento voluntário de filho (perfilhação) é: FORMAL (exige uma das formas do art. 1.609 CC), VOLUNTÁRIO/LIVRE, IRREVOGÁVEL/IRRETRATÁVEL (art. 1.610 CC), INCONDICIONAL (não pode ser sujeito a termo ou condição), PERSONALÍSSIMO (só pode ser feito pelo próprio pai/mãe).", "B": "Incorreta. Art. 1.609, CC lista CINCO formas válidas: registro de nascimento, escritura pública, escrito particular, testamento, e manifestação perante o juiz. Não é exclusivamente por escritura pública ou instrumento particular.", "C": "Incorreta. Art. 1.609, §único, CC: é possível o reconhecimento de filhos falecidos — desde que tenham deixado descendentes.", "D": "Incorreta. Art. 1.614, CC: o reconhecimento do filho MAIOR exige o CONSENTIMENTO do filho. Sem consentimento, não produz efeitos."}, fund:"Art. 1.609, CC: formas de reconhecimento (5 modalidades). Art. 1.610, CC: irrevogabilidade. Art. 1.609, §único: possível reconhecer filho falecido com descendentes. Art. 1.614: filho maior precisa consentir.", caqui:"FVIP-I: Formal, Voluntário, Irrevogável, Personalíssimo, Incondicional. Cinco formas válidas (não só escritura). Filho falecido COM descendentes: pode reconhecer. Filho MAIOR: precisa consentir (sem consentimento, não vale). Filho MENOR: não precisa de consentimento dele, mas pode impugnar quando atingir a maioridade."},
  {num:40, exame:"VI Exame — 2012", titulo:"Casamento entre Primos — Casamento Válido", enunciado:"Rejane, solteira, com 16 anos de idade, órfã de mãe e devidamente autorizada por seu pai, casa-se com Jarbas, filho de sua tia materna, sendo ele solteiro e capaz, com 23 anos de idade.", comando:"A respeito do casamento realizado, é correto afirmar que é:", gabarito:"C", alt:{"A": "Nulo, tendo em vista o parentesco existente entre Rejane e Jarbas.", "B": "Anulável, tendo em vista que, por ser órfã de mãe, Rejane deveria obter autorização judicial a fim de suprir o consentimento materno.", "C": "Válido.", "D": "Anulável, tendo em vista o parentesco existente entre Rejane e Jarbas."}, fb:{"A": "Incorreta. Primos não constam do rol de impedimentos matrimoniais do art. 1.521, CC. O casamento entre primos é PERMITIDO.", "B": "Incorreta. Art. 1.517, CC: o menor entre 16 e 18 anos pode casar com autorização de AMBOS OS PAIS ou de um deles quando o outro for morto ou ausente. Como a mãe morreu, a autorização do pai é SUFICIENTE — não precisa de autorização judicial.", "C": "Correta! (1) Rejane tem 16 anos + autorização do pai sobrevivente = capacidade nupcial satisfeita. (2) Jarbas é filho da tia materna de Rejane = são primos = colaterais de 4º grau = sem impedimento matrimonial. Casamento VÁLIDO.", "D": "Incorreta. Primos não têm impedimento matrimonial."}, fund:"Art. 1.521, CC: rol taxativo de impedimentos matrimoniais — primos (colaterais de 4º grau) NÃO estão no rol. Art. 1.517, CC: menor de 16 a 18 anos pode casar com autorização dos pais ou do sobrevivente se um deles morreu.", caqui:"Dois pontos: (1) PRIMOS PODEM CASAR — não estão no rol de impedimentos (art. 1.521 CC). Parente colateral de 4º grau = sem proibição. (2) Órfã de mãe com 16 anos = autorização do PAI SOBREVIVENTE é suficiente, não precisa de juiz. A autorização judicial só seria necessária se ambos os pais fossem mortos/ausentes ou se recusassem sem motivo."},
];
let cur=0,N=QUESTOES.length;
const E=Array(N).fill(null);
function init(){
  const nw=document.getElementById('nw'),ct=document.getElementById('ct');
  QUESTOES.forEach((q,i)=>{
    const b=document.createElement('button');
    b.className='nb'+(i===0?' active':'');b.textContent=i+1;b.onclick=()=>go(i);b.id='n'+i;nw.appendChild(b);
    const d=document.createElement('div');d.className='qc'+(i===0?' vis':'');d.id='c'+i;d.innerHTML=bc(q,i);ct.appendChild(d);
  });upd();us();
}
function bc(q,i){
  const al=Object.entries(q.alt).map(([l,t])=>`<button class="ab" onclick="resp(${i},'${l}',this)" data-l="${l}"><span class="all">${l}</span><span class="alt">${t}</span></button>`).join('');
  return `<div class="qh"><span class="qn">Questão ${q.num}</span>${q.exame?`<span class="qe">${q.exame}</span>`:''}</div><h2 class="qt">${q.titulo}</h2><div class="en">${q.enunciado}</div><p class="co">${q.comando}</p><div class="al" id="a${i}">${al}</div><div class="fb" id="f${i}"></div><div class="fu" id="u${i}"><h4>📖 Fundamento legal</h4>${q.fund}</div><div class="cx" id="x${i}"><h4>🍊 Explicação didática do Professor Caqui</h4>${q.caqui}</div><div class="ca"><div class="bg"><button class="btn tm" id="bu${i}" onclick="tF(${i})">Ver fundamento legal</button><button class="btn cq" id="bx${i}" onclick="tX(${i})">Explicação do Prof. Caqui</button><button class="btn" id="br${i}" onclick="rst(${i})">↺ Tentar novamente</button></div><span class="st" id="s${i}"></span></div>`;
}
function resp(i,l,btn){
  if(E[i]!==null)return;E[i]=l;const q=QUESTOES[i];
  document.querySelectorAll(`#a${i} .ab`).forEach(b=>{b.disabled=true;if(b.dataset.l===q.gabarito)b.classList.add('cor');if(b.dataset.l===l&&l!==q.gabarito)b.classList.add('err');});
  const ok=l===q.gabarito,f=document.getElementById('f'+i);
  f.className='fb sh '+(ok?'ac':'er');f.innerHTML=`<strong>${ok?'✓ Correta!':'✗ Incorreta.'}</strong> ${q.fb[l]}`;
  document.getElementById('s'+i).textContent=ok?'Acerto!':'Gabarito: '+q.gabarito;
  document.getElementById('br'+i).className='btn sh';document.getElementById('bu'+i).className='btn tm sh';document.getElementById('bx'+i).className='btn cq sh';
  const nb=document.getElementById('n'+i);nb.classList.remove('active');nb.classList.add(ok?'ok':'no');if(i===cur)nb.classList.add('active');us();
}
function tF(i){const b=document.getElementById('u'+i),t=document.getElementById('bu'+i),v=b.classList.contains('sh');b.className=v?'fu':'fu sh';t.textContent=v?'Ver fundamento legal':'Ocultar fundamento';}
function tX(i){const b=document.getElementById('x'+i),t=document.getElementById('bx'+i),v=b.classList.contains('sh');b.className=v?'cx':'cx sh';t.textContent=v?'Explicação do Prof. Caqui':'Ocultar explicação';}
function rst(i){
  E[i]=null;document.querySelectorAll(`#a${i} .ab`).forEach(b=>{b.disabled=false;b.className='ab';});
  document.getElementById('f'+i).className='fb';document.getElementById('u'+i).className='fu';document.getElementById('bu'+i).className='btn tm';document.getElementById('bu'+i).textContent='Ver fundamento legal';
  document.getElementById('x'+i).className='cx';document.getElementById('bx'+i).className='btn cq';document.getElementById('bx'+i).textContent='Explicação do Prof. Caqui';
  document.getElementById('br'+i).className='btn';document.getElementById('s'+i).textContent='';
  document.getElementById('n'+i).className='nb'+(i===cur?' active':'');us();
}
function go(i){document.getElementById('c'+cur).classList.remove('vis');document.getElementById('n'+cur).classList.remove('active');cur=i;document.getElementById('c'+cur).classList.add('vis');document.getElementById('n'+cur).classList.add('active');upd();window.scrollTo({top:0,behavior:'smooth'});}
function nav(d){const n=cur+d;if(n>=0&&n<N)go(n);}
function upd(){document.getElementById('pi').textContent=(cur+1)+' de '+N;document.getElementById('bp').disabled=cur===0;document.getElementById('bn').disabled=cur===N-1;}
function us(){const r=E.filter(e=>e!==null).length,a=E.filter((e,i)=>e===QUESTOES[i].gabarito).length;document.getElementById('sc-t').textContent=r;document.getElementById('sc-a').textContent=a;document.getElementById('sc-e').textContent=r-a;const p=Math.round((r/N)*100);document.getElementById('pf').style.width=p+'%';document.getElementById('pl').textContent=r+' de '+N+' respondidas';}
init();
</script>
